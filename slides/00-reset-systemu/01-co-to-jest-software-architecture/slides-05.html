<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 05 — Definicja Grady Booch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 30%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            width: 1500px;
            display: flex;
            align-items: center;
            gap: 80px;
        }

        /* Portrait */
        .portrait-wrapper {
            flex-shrink: 0;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.3s forwards;
        }

        .portrait {
            width: 320px;
            height: 400px;
            border-radius: 32px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .portrait img {
            width: 100%;
            height: 260px;
            object-fit: contain;
            border-radius: 24px 24px 0 0;
        }

        .portrait-name {
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        .portrait-role {
            font-size: 16px;
            color: var(--text-muted);
            text-align: center;
            padding: 0 20px;
        }

        /* Quote */
        .quote-block {
            flex: 1;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.6s forwards;
        }

        .quote-label {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            font-weight: 600;
        }

        .quote-text {
            font-size: 36px;
            font-weight: 500;
            line-height: 1.5;
            color: #e2e8f0;
            position: relative;
            padding-left: 32px;
            border-left: 4px solid var(--cyan-400);
        }

        .quote-text strong {
            color: var(--cyan-400);
            font-weight: 700;
        }

        .takeaway {
            margin-top: 48px;
            padding: 20px 32px;
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 16px;
            font-size: 22px;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeIn 1s ease-out 1.4s forwards;
        }

        .takeaway strong {
            color: var(--cyan-400);
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.1;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 400px; height: 400px; bottom: 15%; left: 5%;"></div>

        <div class="content">
            <div class="portrait-wrapper">
                <div class="portrait">
                    <img src="images/Grady-Booch-transparent.png" alt="Grady Booch">
                    <span class="portrait-name">Grady Booch</span>
                    <span class="portrait-role">Chief Scientist, IBM Research</span>
                </div>
            </div>

            <div class="quote-block">
                <span class="quote-label">Definicja nr 1</span>
                <p class="quote-text">
                    "Software architecture is a collection of <strong>significant decisions</strong> [...] with the <strong>cost of change</strong> serving as the primary metric of significance."
                </p>
                <div class="takeaway">
                    Kluczowa miara: <strong>koszt zmiany</strong>
                </div>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
