<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 06 — Koszt zmiany</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            width: 1500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -40px;
        }

        .section-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        h2.title {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 80px;
            text-align: center;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        /* Axis */
        .axis-wrapper {
            width: 1300px;
            position: relative;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.5s forwards;
        }

        .axis-line {
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, #22c55e, #eab308 40%, #ef4444);
            border-radius: 2px;
            position: relative;
            margin-bottom: 16px;
        }

        .axis-arrow-left, .axis-arrow-right {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 28px;
            font-weight: 700;
        }

        .axis-arrow-left {
            left: -40px;
            color: #22c55e;
        }

        .axis-arrow-right {
            right: -40px;
            color: #ef4444;
        }

        .axis-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 48px;
        }

        .axis-label {
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .axis-label.low { color: #22c55e; }
        .axis-label.high { color: #ef4444; }

        /* Items on axis */
        .axis-items {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 8px;
        }

        .axis-side {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .axis-side.left { align-items: flex-start; }
        .axis-side.right { align-items: flex-end; }

        .axis-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 500;
            opacity: 0;
        }

        .axis-item.low-cost {
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.25);
            color: #86efac;
        }

        .axis-item.high-cost {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #fca5a5;
        }

        .axis-item:nth-child(1) { animation: fadeUp 0.7s ease-out 0.8s forwards; }
        .axis-item:nth-child(2) { animation: fadeUp 0.7s ease-out 1.0s forwards; }
        .axis-item:nth-child(3) { animation: fadeUp 0.7s ease-out 1.2s forwards; }

        .axis-item i {
            font-size: 24px;
        }

        /* Bottom takeaway */
        .takeaway {
            margin-top: 64px;
            padding: 20px 40px;
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 16px;
            font-size: 26px;
            font-weight: 600;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeUp 1s ease-out 1.6s forwards;
        }

        .takeaway strong {
            color: var(--cyan-400);
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 400px; height: 400px; top: 10%; left: 5%;"></div>
        <div class="accent" style="width: 500px; height: 500px; bottom: 15%; right: 10%;"></div>

        <div class="content">
            <span class="section-label">Koszt zmiany</span>
            <h2 class="title">Które decyzje są <span class="highlight">architektoniczne</span>?</h2>

            <div class="axis-wrapper">
                <div class="axis-line">
                    <span class="axis-arrow-left">◂</span>
                    <span class="axis-arrow-right">▸</span>
                </div>
                <div class="axis-labels">
                    <span class="axis-label low">Niski koszt zmiany</span>
                    <span class="axis-label high">Wysoki koszt zmiany</span>
                </div>

                <div class="axis-items">
                    <div class="axis-side left">
                        <div class="axis-item low-cost">
                            <i class="ti ti-palette"></i>
                            Zmiana koloru przycisku
                        </div>
                        <div class="axis-item low-cost">
                            <i class="ti ti-code"></i>
                            Refaktoryzacja klasy
                        </div>
                    </div>
                    <div class="axis-side right">
                        <div class="axis-item high-cost">
                            <i class="ti ti-arrows-exchange"></i>
                            Model komunikacji
                        </div>
                        <div class="axis-item high-cost">
                            <i class="ti ti-database"></i>
                            Wybór bazy danych
                        </div>
                        <div class="axis-item high-cost">
                            <i class="ti ti-graph"></i>
                            Mikroserwisy
                        </div>
                    </div>
                </div>
            </div>

            <div class="takeaway">
                Decyzja architektoniczna = Decyzja <strong>trudna do odwrócenia</strong>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
