<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 09 - Dlaczego dbać o architekturę?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            width: 1500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -20px;
        }

        h2.title {
            font-size: 60px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 72px;
            text-align: center;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        /* Split comparison */
        .comparison {
            display: flex;
            width: 100%;
            gap: 48px;
            justify-content: center;
        }

        .side {
            flex: 1;
            max-width: 600px;
            padding: 48px 40px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .side.chaos {
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.2);
            opacity: 0;
            animation: fadeLeft 0.8s ease-out 0.5s forwards;
        }

        .side.order {
            background: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.2);
            opacity: 0;
            animation: fadeRight 0.8s ease-out 0.5s forwards;
        }

        .side-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .side-header i {
            font-size: 36px;
        }

        .chaos .side-header i { color: #ef4444; }
        .order .side-header i { color: #22c55e; }

        .side-header span {
            font-size: 28px;
            font-weight: 700;
        }

        .chaos .side-header span { color: #fca5a5; }
        .order .side-header span { color: #86efac; }

        .side-item {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 24px;
            font-weight: 500;
            padding: 16px 20px;
            border-radius: 12px;
            opacity: 0;
        }

        .chaos .side-item {
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.06);
        }

        .order .side-item {
            color: #86efac;
            background: rgba(34, 197, 94, 0.06);
        }

        .side-item:nth-child(2) { animation: fadeUp 0.6s ease-out 0.9s forwards; }
        .side-item:nth-child(3) { animation: fadeUp 0.6s ease-out 1.1s forwards; }
        .side-item:nth-child(4) { animation: fadeUp 0.6s ease-out 1.3s forwards; }

        .side-item i {
            font-size: 24px;
            flex-shrink: 0;
        }

        /* Divider */
        .vs-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 800;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeIn 1s ease-out 0.8s forwards;
        }

        .accent {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.1;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeLeft {
            from { opacity: 0; transform: translateX(-40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>

        <div class="accent" style="width: 500px; height: 500px; background: #ef4444; top: 20%; left: 5%;"></div>
        <div class="accent" style="width: 500px; height: 500px; background: #22c55e; top: 20%; right: 5%;"></div>

        <div class="content">
            <h2 class="title">Dlaczego dbać o <span class="highlight">architekturę</span>?</h2>

            <div class="comparison">
                <div class="side chaos">
                    <div class="side-header">
                        <i class="ti ti-alert-triangle"></i>
                        <span>Chaos</span>
                    </div>
                    <div class="side-item">
                        <i class="ti ti-bug"></i>
                        Kruchy system
                    </div>
                    <div class="side-item">
                        <i class="ti ti-mood-sad"></i>
                        Niezadowoleni użytkownicy
                    </div>
                    <div class="side-item">
                        <i class="ti ti-flame"></i>
                        Strach przed wdrożeniem
                    </div>
                </div>

                <div class="vs-divider">VS</div>

                <div class="side order">
                    <div class="side-header">
                        <i class="ti ti-shield-check"></i>
                        <span>Ład</span>
                    </div>
                    <div class="side-item">
                        <i class="ti ti-refresh"></i>
                        Adaptacyjność
                    </div>
                    <div class="side-item">
                        <i class="ti ti-thumb-up"></i>
                        Wiarygodność
                    </div>
                    <div class="side-item">
                        <i class="ti ti-rocket"></i>
                        Przewaga rynkowa
                    </div>
                </div>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
