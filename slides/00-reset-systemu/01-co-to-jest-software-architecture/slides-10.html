<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 10 - Analogia domów</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            width: 1500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -40px;
        }

        .section-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        h2.title {
            font-size: 60px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 80px;
            text-align: center;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        /* Two houses */
        .houses {
            display: flex;
            gap: 80px;
            justify-content: center;
            margin-bottom: 60px;
        }

        .house {
            width: 500px;
            padding: 48px 40px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 24px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .house:nth-child(1) { animation: fadeUp 0.8s ease-out 0.5s forwards; }
        .house:nth-child(2) { animation: fadeUp 0.8s ease-out 0.8s forwards; }

        .house:hover {
            border-color: var(--cyan-500);
            transform: translateY(-8px);
            box-shadow: 0 8px 32px rgba(6, 182, 212, 0.15);
        }

        /* CSS mountain house */
        .house-visual {
            width: 200px;
            height: 180px;
            position: relative;
            margin-bottom: 12px;
        }

        /* Mountain cabin - steep roof */
        .cabin {
            position: relative;
            width: 120px;
            height: 160px;
            margin: 0 auto;
        }

        .cabin-roof {
            width: 0;
            height: 0;
            border-left: 80px solid transparent;
            border-right: 80px solid transparent;
            border-bottom: 100px solid rgba(6, 182, 212, 0.3);
            margin: 0 auto;
            position: relative;
            left: -20px;
        }

        .cabin-body {
            width: 120px;
            height: 60px;
            background: rgba(6, 182, 212, 0.15);
            border: 1px solid rgba(6, 182, 212, 0.3);
            margin: 0 auto;
        }

        /* Skyscraper */
        .skyscraper {
            position: relative;
            width: 80px;
            height: 170px;
            margin: 0 auto;
        }

        .sky-body {
            width: 80px;
            height: 170px;
            background: linear-gradient(180deg, rgba(6, 182, 212, 0.2), rgba(6, 182, 212, 0.08));
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 4px 4px 0 0;
            position: relative;
        }

        .sky-window {
            position: absolute;
            width: 14px;
            height: 10px;
            background: rgba(34, 211, 238, 0.4);
            border-radius: 1px;
        }

        .sky-body .sky-window:nth-child(1) { top: 12px; left: 10px; }
        .sky-body .sky-window:nth-child(2) { top: 12px; right: 10px; }
        .sky-body .sky-window:nth-child(3) { top: 32px; left: 10px; }
        .sky-body .sky-window:nth-child(4) { top: 32px; right: 10px; }
        .sky-body .sky-window:nth-child(5) { top: 52px; left: 10px; }
        .sky-body .sky-window:nth-child(6) { top: 52px; right: 10px; }
        .sky-body .sky-window:nth-child(7) { top: 72px; left: 10px; }
        .sky-body .sky-window:nth-child(8) { top: 72px; right: 10px; }
        .sky-body .sky-window:nth-child(9) { top: 92px; left: 10px; }
        .sky-body .sky-window:nth-child(10) { top: 92px; right: 10px; }
        .sky-body .sky-window:nth-child(11) { top: 112px; left: 10px; }
        .sky-body .sky-window:nth-child(12) { top: 112px; right: 10px; }
        .sky-body .sky-window:nth-child(13) { top: 132px; left: 10px; }
        .sky-body .sky-window:nth-child(14) { top: 132px; right: 10px; }

        .house-name {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
        }

        .house-context {
            font-size: 20px;
            color: var(--cyan-400);
            font-weight: 600;
            padding: 8px 24px;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 100px;
            border: 1px solid rgba(6, 182, 212, 0.2);
        }

        .bottom-text {
            font-size: 28px;
            color: var(--text-muted);
            text-align: center;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.4s forwards;
        }

        .bottom-text strong {
            color: var(--cyan-400);
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 400px; height: 400px; top: 10%; left: 10%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 15%; right: 10%;"></div>

        <div class="content">
            <span class="section-label">Analogia</span>
            <h2 class="title">Architektura zależy od <span class="highlight">środowiska</span></h2>

            <div class="houses">
                <div class="house">
                    <div class="house-visual">
                        <div class="cabin">
                            <div class="cabin-roof"></div>
                            <div class="cabin-body"></div>
                        </div>
                    </div>
                    <span class="house-name">Domek w górach</span>
                    <span class="house-context">Góry - Lawiny</span>
                </div>

                <div class="house">
                    <div class="house-visual">
                        <div class="skyscraper">
                            <div class="sky-body">
                                <div class="sky-window"></div><div class="sky-window"></div>
                                <div class="sky-window"></div><div class="sky-window"></div>
                                <div class="sky-window"></div><div class="sky-window"></div>
                                <div class="sky-window"></div><div class="sky-window"></div>
                                <div class="sky-window"></div><div class="sky-window"></div>
                                <div class="sky-window"></div><div class="sky-window"></div>
                                <div class="sky-window"></div><div class="sky-window"></div>
                            </div>
                        </div>
                    </div>
                    <span class="house-name">Drapacz chmur</span>
                    <span class="house-context">Metropolia - Gęstość</span>
                </div>
            </div>

            <p class="bottom-text">Inne środowisko = inne <strong>decyzje architektoniczne</strong></p>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
