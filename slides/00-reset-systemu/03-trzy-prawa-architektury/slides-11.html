<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 11 — Zielone vs Czerwone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            width: 1500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -40px;
        }

        h2.title {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 64px;
            text-align: center;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .green { color: #22c55e; }
        h2.title .red { color: #ef4444; }

        .columns {
            display: flex;
            gap: 60px;
            width: 100%;
        }

        .column {
            flex: 1;
            border-radius: 24px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .column.green-col {
            background: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.2);
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.5s forwards;
        }

        .column.red-col {
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.2);
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.8s forwards;
        }

        .col-header {
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .green-col .col-header { color: #22c55e; }
        .red-col .col-header { color: #ef4444; }

        .col-header i { font-size: 28px; }

        .col-item {
            font-size: 24px;
            font-weight: 500;
            padding: 16px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .green-col .col-item {
            color: #86efac;
            background: rgba(34, 197, 94, 0.06);
        }

        .red-col .col-item {
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.06);
        }

        .col-item i { font-size: 22px; flex-shrink: 0; }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 400px; height: 400px; top: 10%; left: 5%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 15%; right: 5%;"></div>

        <div class="content">
            <h2 class="title"><span class="green">Adaptowalność</span> vs <span class="red">Wysokie sprzężenie</span></h2>

            <div class="columns">
                <div class="column green-col">
                    <div class="col-header">
                        <i class="ti ti-circle-check"></i>
                        Zielone światła
                    </div>
                    <div class="col-item">
                        <i class="ti ti-rocket"></i>
                        Niezależny deployment
                    </div>
                    <div class="col-item">
                        <i class="ti ti-user-plus"></i>
                        Onboarding w tydzień
                    </div>
                    <div class="col-item">
                        <i class="ti ti-edit"></i>
                        Zmiany w jednym miejscu
                    </div>
                </div>

                <div class="column red-col">
                    <div class="col-header">
                        <i class="ti ti-alert-octagon"></i>
                        Czerwone światła
                    </div>
                    <div class="col-item">
                        <i class="ti ti-lock"></i>
                        "Nie ruszaj, bo się posypie"
                    </div>
                    <div class="col-item">
                        <i class="ti ti-clock"></i>
                        Dwa sprinty na nowe pole
                    </div>
                    <div class="col-item">
                        <i class="ti ti-users"></i>
                        Koordynacja wielu zespołów
                    </div>
                </div>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
