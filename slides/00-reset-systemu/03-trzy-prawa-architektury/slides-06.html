<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 06 - II Prawo: Prawo Conwaya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .law-number {
            font-size: 280px;
            font-weight: 900;
            color: rgba(34, 211, 238, 0.06);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
            letter-spacing: -10px;
        }

        .content {
            position: relative;
            z-index: 10;
            width: 1500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -40px;
        }

        .section-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        h2.title {
            font-size: 72px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 32px;
            text-align: center;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -2px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        .sub-text {
            font-size: 28px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 72px;
            max-width: 1100px;
            line-height: 1.5;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.6s forwards;
        }

        /* Conway diagram */
        .conway-diagram {
            display: flex;
            align-items: center;
            gap: 80px;
            opacity: 0;
            animation: fadeUp 1s ease-out 1s forwards;
        }

        .conway-side {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 12px;
            width: 300px;
        }

        .conway-side-label {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--cyan-400);
            font-weight: 600;
            margin-bottom: 16px;
        }

        .team-group {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.25);
            border-radius: 12px;
            min-width: 240px;
        }

        .team-group .team-icon {
            font-size: 22px;
            color: #86efac;
        }

        .team-group .team-name {
            font-size: 20px;
            font-weight: 600;
            color: #86efac;
        }

        .module-box {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 12px;
            min-width: 240px;
        }

        .module-box .module-icon {
            font-size: 22px;
            color: #c084fc;
        }

        .module-box .module-name {
            font-size: 20px;
            font-weight: 600;
            color: #c084fc;
        }

        .conway-equals {
            font-size: 56px;
            color: var(--cyan-400);
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="law-number">02</div>

        <div class="accent" style="width: 400px; height: 400px; top: 10%; left: 5%;"></div>
        <div class="accent" style="width: 500px; height: 500px; bottom: 10%; right: 10%;"></div>

        <div class="content">
            <span class="section-label">II Prawo Architektury</span>
            <h2 class="title">Prawo <span class="highlight">Conwaya</span></h2>
            <p class="sub-text">Architektura systemu odzwierciedla strukturę organizacji.</p>

            <div class="conway-diagram">
                <div class="conway-side">
                    <span class="conway-side-label">Zespoły</span>
                    <div class="team-group"><i class="ti ti-brush team-icon"></i><span class="team-name">Frontend Team</span></div>
                    <div class="team-group"><i class="ti ti-server team-icon"></i><span class="team-name">Backend Team</span></div>
                    <div class="team-group"><i class="ti ti-database team-icon"></i><span class="team-name">Data Team</span></div>
                    <div class="team-group"><i class="ti ti-package team-icon"></i><span class="team-name">Product Team</span></div>
                </div>

                <span class="conway-equals"><i class="ti ti-arrow-right"></i></span>

                <div class="conway-side">
                    <span class="conway-side-label">System</span>
                    <div class="module-box"><i class="ti ti-browser module-icon"></i><span class="module-name">Frontend</span></div>
                    <div class="module-box"><i class="ti ti-code module-icon"></i><span class="module-name">Backend</span></div>
                    <div class="module-box"><i class="ti ti-database module-icon"></i><span class="module-name">Warstwa danych</span></div>
                    <div class="module-box"><i class="ti ti-bulb module-icon"></i><span class="module-name">Logika biznesowa</span></div>
                </div>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
