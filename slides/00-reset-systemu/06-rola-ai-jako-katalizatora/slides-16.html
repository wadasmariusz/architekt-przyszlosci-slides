<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 16 - AI jako research</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 1500px;
        }

        .section-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        h2.title {
            font-size: 64px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 60px;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        /* Comparison table */
        .comp-table {
            border-collapse: separate;
            border-spacing: 0;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.6s forwards;
        }

        .comp-table th {
            padding: 24px 48px;
            font-size: 20px;
            font-weight: 700;
            color: var(--cyan-400);
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(6, 182, 212, 0.08);
            border-bottom: 1px solid rgba(6, 182, 212, 0.2);
        }

        .comp-table td {
            padding: 20px 48px;
            font-size: 20px;
            color: var(--text-main);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .comp-table tr:last-child td {
            border-bottom: none;
        }

        .comp-table td:first-child {
            font-weight: 600;
            color: var(--text-muted);
        }

        .check { color: rgba(34, 197, 94, 0.8); }
        .cross { color: rgba(239, 68, 68, 0.8); }
        .mid { color: rgba(251, 191, 36, 0.8); }

        .bottom-text {
            margin-top: 50px;
            font-size: 28px;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeIn 1s ease-out 1.2s forwards;
        }

        .bottom-text strong {
            color: var(--cyan-400);
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.1;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 500px; height: 500px; top: 10%; right: 5%;"></div>

        <div class="content">
            <span class="section-label">Research</span>
            <h2 class="title">AI jako <span class="highlight">szybkie porównania</span></h2>

            <table class="comp-table">
                <thead>
                    <tr>
                        <th>Kryterium</th>
                        <th>PostgreSQL</th>
                        <th>MongoDB</th>
                        <th>DynamoDB</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Skalowalność</td>
                        <td class="mid">Średnia</td>
                        <td class="check">Wysoka</td>
                        <td class="check">Bardzo wysoka</td>
                    </tr>
                    <tr>
                        <td>Złożone zapytania</td>
                        <td class="check">Tak</td>
                        <td class="mid">Ograniczone</td>
                        <td class="cross">Nie</td>
                    </tr>
                    <tr>
                        <td>Koszt</td>
                        <td class="check">Niski</td>
                        <td class="mid">Średni</td>
                        <td class="mid">Pay-per-use</td>
                    </tr>
                    <tr>
                        <td>Elastyczność schematu</td>
                        <td class="cross">Sztywny</td>
                        <td class="check">Elastyczny</td>
                        <td class="check">Elastyczny</td>
                    </tr>
                </tbody>
            </table>

            <p class="bottom-text">Szybkie porównania &rarr; <strong>lepsze decyzje</strong></p>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
