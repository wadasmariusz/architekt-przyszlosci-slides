<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 04 - Luka walidacyjna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 1500px;
        }

        .section-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        h2.title {
            font-size: 64px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 60px;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        /* Chart */
        .chart {
            width: 900px;
            height: 400px;
            position: relative;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.6s forwards;
        }

        .chart-svg {
            width: 100%;
            height: 100%;
        }

        .gap-label {
            margin-top: 40px;
            font-size: 28px;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeIn 1s ease-out 1.2s forwards;
        }

        .gap-label strong {
            color: rgba(239, 68, 68, 0.9);
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.1;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 600px; height: 600px; top: 10%; right: 5%;"></div>

        <div class="content">
            <span class="section-label">Problem</span>
            <h2 class="title"><span class="highlight">Luka</span> walidacyjna</h2>

            <div class="chart">
                <svg class="chart-svg" viewBox="0 0 900 400">
                    <!-- Axes -->
                    <line x1="80" y1="350" x2="850" y2="350" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
                    <line x1="80" y1="350" x2="80" y2="30" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

                    <!-- Generation line (steep) -->
                    <path d="M 80 340 Q 300 300 450 180 T 830 40" fill="none" stroke="#22d3ee" stroke-width="4" stroke-dasharray="1000" stroke-dashoffset="1000">
                        <animate attributeName="stroke-dashoffset" from="1000" to="0" dur="2s" begin="0.8s" fill="freeze"/>
                    </path>
                    <text x="835" y="35" fill="#22d3ee" font-size="20" font-weight="600">Generowanie</text>

                    <!-- Validation line (flat) -->
                    <path d="M 80 340 Q 300 320 450 280 T 830 220" fill="none" stroke="rgba(239, 68, 68, 0.8)" stroke-width="4" stroke-dasharray="1000" stroke-dashoffset="1000">
                        <animate attributeName="stroke-dashoffset" from="1000" to="0" dur="2s" begin="1.2s" fill="freeze"/>
                    </path>
                    <text x="835" y="215" fill="rgba(239, 68, 68, 0.8)" font-size="20" font-weight="600">Walidacja</text>

                    <!-- Gap annotation -->
                    <line x1="700" y1="100" x2="700" y2="240" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="8,4">
                        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.5s" fill="freeze"/>
                    </line>
                    <text x="715" y="175" fill="rgba(255,255,255,0.5)" font-size="18" opacity="0">
                        GAP
                        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.5s" fill="freeze"/>
                    </text>

                    <!-- Axis labels -->
                    <text x="460" y="390" fill="rgba(255,255,255,0.4)" font-size="16" text-anchor="middle">Czas</text>
                    <text x="30" y="190" fill="rgba(255,255,255,0.4)" font-size="16" text-anchor="middle" transform="rotate(-90, 30, 190)">Zdolność</text>
                </svg>
            </div>

            <p class="gap-label">Generowanie &gt; walidacja = <strong>rosnące ryzyko</strong></p>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
