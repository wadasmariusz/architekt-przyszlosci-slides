<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 09 - AI w walidacji</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 1500px;
        }

        .section-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        h2.title {
            font-size: 64px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 80px;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        /* Iterative loop */
        .iter-loop {
            display: flex;
            align-items: center;
            gap: 24px;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.6s forwards;
        }

        .iter-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 32px 36px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }

        .iter-step:hover {
            border-color: var(--cyan-400);
            transform: translateY(-6px);
            box-shadow: 0 8px 32px rgba(6, 182, 212, 0.15);
        }

        .iter-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: var(--cyan-400);
        }

        .iter-label {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-main);
        }

        .iter-arrow {
            font-size: 28px;
            color: var(--cyan-400);
        }

        /* Return arrow */
        .return-arrow {
            width: 800px;
            height: 60px;
            margin-top: 20px;
            opacity: 0;
            animation: fadeIn 1s ease-out 1s forwards;
        }

        .bottom-text {
            margin-top: 40px;
            font-size: 28px;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeIn 1s ease-out 1.4s forwards;
        }

        .bottom-text strong {
            color: var(--cyan-400);
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.1;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 500px; height: 500px; top: 5%; right: 5%;"></div>

        <div class="content">
            <span class="section-label">Walidacja</span>
            <h2 class="title">AI w <span class="highlight">walidacji</span></h2>

            <div class="iter-loop">
                <div class="iter-step">
                    <div class="iter-icon"><i class="ti ti-bulb"></i></div>
                    <span class="iter-label">Hipoteza</span>
                </div>
                <span class="iter-arrow"><i class="ti ti-arrow-right"></i></span>
                <div class="iter-step">
                    <div class="iter-icon"><i class="ti ti-flask"></i></div>
                    <span class="iter-label">Test</span>
                </div>
                <span class="iter-arrow"><i class="ti ti-arrow-right"></i></span>
                <div class="iter-step">
                    <div class="iter-icon"><i class="ti ti-chart-bar"></i></div>
                    <span class="iter-label">Wynik</span>
                </div>
                <span class="iter-arrow"><i class="ti ti-arrow-right"></i></span>
                <div class="iter-step">
                    <div class="iter-icon"><i class="ti ti-adjustments"></i></div>
                    <span class="iter-label">Poprawka</span>
                </div>
            </div>

            <svg class="return-arrow" viewBox="0 0 800 60">
                <path d="M 700 10 C 750 10, 770 30, 770 40 C 770 50, 750 55, 700 55 L 100 55 C 50 55, 30 50, 30 40 L 30 35" fill="none" stroke="rgba(34, 211, 238, 0.3)" stroke-width="2" stroke-dasharray="8,4"/>
                <polygon points="25,42 30,28 35,42" fill="rgba(34, 211, 238, 0.4)"/>
            </svg>

            <p class="bottom-text">Prototypy i <strong>szybkie eksperymenty</strong></p>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
