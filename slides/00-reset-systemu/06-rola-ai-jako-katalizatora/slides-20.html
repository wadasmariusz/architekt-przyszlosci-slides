<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 20 - Enterprise i kontekst</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            width: 1500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -40px;
        }

        .section-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        h2.title {
            font-size: 64px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 80px;
            text-align: center;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        /* Enterprise visual */
        .enterprise-row {
            display: flex;
            gap: 48px;
            justify-content: center;
            align-items: center;
            margin-bottom: 60px;
        }

        .sys-box {
            width: 320px;
            padding: 40px 32px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 20px;
            opacity: 0;
        }

        .sys-box.legacy {
            background: rgba(251, 191, 36, 0.05);
            border: 1px solid rgba(251, 191, 36, 0.2);
            animation: fadeUp 0.7s ease-out 0.5s forwards;
        }

        .sys-box.new {
            background: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.2);
            animation: fadeUp 0.7s ease-out 0.7s forwards;
        }

        .sys-box.warning {
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.2);
            animation: fadeUp 0.7s ease-out 0.9s forwards;
        }

        .sys-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }

        .legacy .sys-icon {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            color: rgba(251, 191, 36, 0.8);
        }

        .new .sys-icon {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: rgba(34, 197, 94, 0.8);
        }

        .warning .sys-icon {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: rgba(239, 68, 68, 0.8);
        }

        .sys-name {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
        }

        .sys-desc {
            font-size: 18px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .bottom-text {
            font-size: 28px;
            color: var(--text-muted);
            text-align: center;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.4s forwards;
        }

        .bottom-text strong {
            color: rgba(239, 68, 68, 0.8);
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 400px; height: 400px; top: 10%; left: 10%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 15%; right: 10%;"></div>

        <div class="content">
            <span class="section-label">Enterprise</span>
            <h2 class="title">Enterprise i <span class="highlight">kontekst</span></h2>

            <div class="enterprise-row">
                <div class="sys-box legacy">
                    <div class="sys-icon"><i class="ti ti-building"></i></div>
                    <span class="sys-name">Legacy system</span>
                    <p class="sys-desc">Lata historii,<br>ukryte zależności,<br>brak dokumentacji</p>
                </div>

                <div class="sys-box new">
                    <div class="sys-icon"><i class="ti ti-sparkles"></i></div>
                    <span class="sys-name">Nowy system</span>
                    <p class="sys-desc">AI-generated,<br>nowoczesny stack,<br>brak kontekstu</p>
                </div>

                <div class="sys-box warning">
                    <div class="sys-icon"><i class="ti ti-alert-triangle"></i></div>
                    <span class="sys-name">Ryzyko</span>
                    <p class="sys-desc">Brak wiedzy domenowej,<br>utracony kontekst,<br>nieznane zależności</p>
                </div>
            </div>

            <p class="bottom-text">Legacy + brak wiedzy = <strong>ryzyko katastrofy</strong></p>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
