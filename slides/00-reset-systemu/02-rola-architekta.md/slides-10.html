<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 10 — Ramy Autonomii</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -40px;
        }

        .section-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        h2.title {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 60px;
            text-align: center;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        /* Playing field metaphor */
        .field {
            width: 900px;
            height: 400px;
            border: 3px solid rgba(34, 211, 238, 0.3);
            border-radius: 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.5s forwards;
            background: rgba(6, 182, 212, 0.03);
        }

        /* Sideline labels */
        .sideline {
            position: absolute;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--cyan-400);
            opacity: 0.6;
        }

        .sideline.top { top: -30px; left: 50%; transform: translateX(-50%); }
        .sideline.bottom { bottom: -30px; left: 50%; transform: translateX(-50%); }
        .sideline.left { left: -60px; top: 50%; transform: translateY(-50%) rotate(-90deg); }
        .sideline.right { right: -80px; top: 50%; transform: translateY(-50%) rotate(90deg); }

        /* Center line */
        .center-line {
            position: absolute;
            left: 50%;
            top: 20px;
            bottom: 20px;
            width: 2px;
            background: rgba(34, 211, 238, 0.1);
        }

        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid rgba(34, 211, 238, 0.1);
        }

        /* Players (dots) */
        .player {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--cyan-400);
            box-shadow: 0 0 12px rgba(34, 211, 238, 0.4);
        }

        .player:nth-child(1) { top: 25%; left: 20%; animation: playerMove1 6s ease-in-out infinite; }
        .player:nth-child(2) { top: 60%; left: 35%; animation: playerMove2 5s ease-in-out infinite; }
        .player:nth-child(3) { top: 40%; left: 55%; animation: playerMove3 7s ease-in-out infinite; }
        .player:nth-child(4) { top: 70%; left: 70%; animation: playerMove4 5.5s ease-in-out infinite; }
        .player:nth-child(5) { top: 30%; left: 80%; animation: playerMove5 6.5s ease-in-out infinite; }

        @keyframes playerMove1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
        @keyframes playerMove2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-20px)} }
        @keyframes playerMove3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-40px)} }
        @keyframes playerMove4 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-40px,20px)} }
        @keyframes playerMove5 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,30px)} }

        /* Guardrails list */
        .guardrails {
            display: flex;
            gap: 32px;
            margin-top: 48px;
        }

        .guardrail-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            background: rgba(6, 182, 212, 0.06);
            border: 1px solid rgba(6, 182, 212, 0.15);
            border-radius: 12px;
            font-size: 18px;
            font-weight: 500;
            color: var(--text-muted);
            opacity: 0;
        }

        .guardrail-item:nth-child(1) { animation: fadeUp 0.7s ease-out 0.9s forwards; }
        .guardrail-item:nth-child(2) { animation: fadeUp 0.7s ease-out 1.1s forwards; }
        .guardrail-item:nth-child(3) { animation: fadeUp 0.7s ease-out 1.3s forwards; }

        .guardrail-item i {
            font-size: 22px;
            color: var(--cyan-400);
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 400px; height: 400px; top: 5%; right: 10%;"></div>

        <div class="content">
            <span class="section-label">Guardrails</span>
            <h2 class="title">Standardy i <span class="highlight">Granice</span></h2>

            <div class="field">
                <span class="sideline top">Standardy</span>
                <span class="sideline bottom">Standardy</span>
                <span class="sideline left">Standardy</span>
                <span class="sideline right">Standardy</span>
                <div class="center-line"></div>
                <div class="center-circle"></div>
                <div class="player"></div>
                <div class="player"></div>
                <div class="player"></div>
                <div class="player"></div>
                <div class="player"></div>
            </div>

            <div class="guardrails">
                <div class="guardrail-item">
                    <i class="ti ti-file-text"></i>
                    Dokumentacja decyzyjna (ADR)
                </div>
                <div class="guardrail-item">
                    <i class="ti ti-ruler-2"></i>
                    Standardy projektowe
                </div>
                <div class="guardrail-item">
                    <i class="ti ti-school"></i>
                    Mentoring
                </div>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
