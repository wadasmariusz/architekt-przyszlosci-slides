<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 07 - Nie podróżuj sam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-top: -40px;
        }

        .section-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        h2.title {
            font-size: 64px;
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 70px;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        /* Elevator with people */
        .elevator-group {
            display: flex;
            align-items: flex-end;
            gap: 24px;
            padding: 48px 64px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(6, 182, 212, 0.15);
            border-radius: 24px;
            margin-bottom: 60px;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.5s forwards;
        }

        .person {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .person-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }

        .person.architect .person-avatar {
            background: rgba(6, 182, 212, 0.15);
            border: 2px solid var(--cyan-400);
            color: var(--cyan-400);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
        }

        .person.senior .person-avatar {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.15);
            color: var(--text-muted);
        }

        .person-label {
            font-size: 16px;
            font-weight: 600;
        }

        .person.architect .person-label { color: var(--cyan-400); }
        .person.senior .person-label { color: var(--text-muted); }

        .elevator-door-left, .elevator-door-right {
            width: 8px;
            height: 160px;
            background: rgba(6, 182, 212, 0.15);
            border-radius: 4px;
        }

        .takeaway {
            padding: 24px 48px;
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 16px;
            font-size: 26px;
            font-weight: 500;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeUp 1s ease-out 1s forwards;
        }

        .takeaway strong {
            color: var(--cyan-400);
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 500px; height: 500px; top: 5%; right: 10%;"></div>

        <div class="content">
            <span class="section-label">Wspólna Perspektywa</span>
            <h2 class="title">Nie podróżuj <span class="highlight">sam</span></h2>

            <div class="elevator-group">
                <div class="elevator-door-left"></div>
                <div class="person senior">
                    <div class="person-avatar"><i class="ti ti-user"></i></div>
                    <span class="person-label">Senior</span>
                </div>
                <div class="person architect">
                    <div class="person-avatar"><i class="ti ti-building-arch"></i></div>
                    <span class="person-label">Architekt</span>
                </div>
                <div class="person senior">
                    <div class="person-avatar"><i class="ti ti-user"></i></div>
                    <span class="person-label">Senior</span>
                </div>
                <div class="person senior">
                    <div class="person-avatar"><i class="ti ti-user"></i></div>
                    <span class="person-label">Senior</span>
                </div>
                <div class="elevator-door-right"></div>
            </div>

            <div class="takeaway">
                Zrozumienie biznesu = <strong>lepsze decyzje techniczne</strong>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
