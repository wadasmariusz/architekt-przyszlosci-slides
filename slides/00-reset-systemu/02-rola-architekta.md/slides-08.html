<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 08 — Dwie pułapki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -40px;
        }

        .section-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        h2.title {
            font-size: 64px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 70px;
            text-align: center;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: rgba(239, 68, 68, 0.8);
            text-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
        }

        /* Split cards */
        .traps {
            display: flex;
            gap: 60px;
            margin-bottom: 60px;
        }

        .trap-card {
            width: 520px;
            padding: 48px 40px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            opacity: 0;
            text-align: center;
        }

        .trap-card:nth-child(1) {
            background: rgba(168, 85, 247, 0.06);
            border: 1px solid rgba(168, 85, 247, 0.2);
            animation: fadeUp 0.8s ease-out 0.5s forwards;
        }

        .trap-card:nth-child(2) {
            background: rgba(34, 197, 94, 0.06);
            border: 1px solid rgba(34, 197, 94, 0.2);
            animation: fadeUp 0.8s ease-out 0.7s forwards;
        }

        .trap-icon {
            font-size: 56px;
        }

        .trap-card:nth-child(1) .trap-icon { color: #a855f7; }
        .trap-card:nth-child(2) .trap-icon { color: #22c55e; }

        .trap-title {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
        }

        .trap-desc {
            font-size: 20px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* Divider */
        .divider-vs {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -36px;
            margin-bottom: -36px;
        }

        .bottom-question {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeIn 1s ease-out 1.2s forwards;
        }

        .bottom-question strong {
            color: var(--cyan-400);
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 400px; height: 400px; top: 10%; left: 5%;"></div>
        <div class="accent" style="width: 500px; height: 500px; bottom: 10%; right: 10%;"></div>

        <div class="content">
            <span class="section-label">Dwie pułapki</span>
            <h2 class="title">Balans na <span class="highlight">krawędzi</span></h2>

            <div class="traps">
                <div class="trap-card">
                    <div class="trap-icon"><i class="ti ti-building-castle"></i></div>
                    <span class="trap-title">Wieża z kości słoniowej</span>
                    <span class="trap-desc">Slajdy bez kontaktu z rzeczywistością. Decyzje oderwane od kodu i zespołu.</span>
                </div>
                <div class="trap-card">
                    <div class="trap-icon"><i class="ti ti-code"></i></div>
                    <span class="trap-title">Zaszycie w kodzie</span>
                    <span class="trap-desc">Utrata perspektywy strategicznej. Brak widoku na całość systemu.</span>
                </div>
            </div>

            <p class="bottom-question">Gdzie <strong>teraz</strong> jesteś?</p>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
