<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 11 — Call to Action</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-top: -60px;
        }

        /* Pulsing dot on chart */
        .mini-chart {
            position: relative;
            width: 300px;
            height: 300px;
            margin-bottom: 60px;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.3s forwards;
        }

        .mini-axis-y {
            position: absolute;
            left: 30px;
            bottom: 30px;
            width: 2px;
            height: 240px;
            background: rgba(255, 255, 255, 0.12);
        }

        .mini-axis-y::after {
            content: '';
            position: absolute;
            top: -8px;
            left: -4px;
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-bottom: 8px solid rgba(255, 255, 255, 0.2);
        }

        .mini-axis-x {
            position: absolute;
            left: 30px;
            bottom: 30px;
            height: 2px;
            width: 240px;
            background: rgba(255, 255, 255, 0.12);
        }

        .mini-axis-x::after {
            content: '';
            position: absolute;
            right: -8px;
            top: -4px;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 8px solid rgba(255, 255, 255, 0.2);
        }

        .pulsing-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--cyan-400);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.6);
            animation: pulse 2s ease-in-out infinite;
        }

        .pulsing-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid rgba(34, 211, 238, 0.3);
            animation: pulseRing 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(34, 211, 238, 0.6); }
            50% { box-shadow: 0 0 40px rgba(34, 211, 238, 0.9); }
        }

        @keyframes pulseRing {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        h2.title {
            font-size: 72px;
            font-weight: 800;
            line-height: 1.15;
            color: #ffffff;
            margin-bottom: 32px;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.6s forwards;
            letter-spacing: -2px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        .subtitle {
            font-size: 28px;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeIn 1s ease-out 1s forwards;
        }

        .subtitle strong {
            color: var(--cyan-400);
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 500px; height: 500px; top: 5%; left: 5%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 10%; right: 15%;"></div>

        <div class="content">
            <div class="mini-chart">
                <div class="mini-axis-y"></div>
                <div class="mini-axis-x"></div>
                <div class="pulsing-ring"></div>
                <div class="pulsing-dot"></div>
            </div>

            <h2 class="title">Zdefiniuj swoje miejsce<br>na <span class="highlight">osi</span></h2>
            <p class="subtitle">To <strong>Ty</strong> budujesz most.</p>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
