<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 11 - Metafora Mostu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
            linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 80px;
            width: 1400px;
        }

        /* Bridge visual */
        .bridge-visual {
            flex-shrink: 0;
            width: 400px;
            height: 350px;
            position: relative;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.3s forwards;
        }

        .bridge-svg {
            width: 100%;
            height: 100%;
        }

        /* Quote side */
        .quote-side {
            flex: 1;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.6s forwards;
        }

        .section-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 32px;
            font-weight: 600;
        }

        .big-quote {
            font-size: 56px;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 40px;
            letter-spacing: -1px;
        }

        .big-quote .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        .quote-desc {
            font-size: 24px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 36px;
        }

        .quote-author {
            padding: 20px 32px;
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 16px;
            font-size: 20px;
            color: var(--text-muted);
            display: inline-block;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.2s forwards;
        }

        .quote-author strong {
            color: var(--cyan-400);
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.1;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="stage" id="stage">
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="accent" style="width: 500px; height: 500px; bottom: 15%; left: 5%;"></div>

    <div class="content">
        <div class="bridge-visual">
            <svg class="bridge-svg" viewBox="0 0 400 350" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Bridge deck -->
                <rect x="20" y="220" width="360" height="12" rx="2" fill="rgba(34, 211, 238, 0.3)" stroke="rgba(34, 211, 238, 0.5)" stroke-width="1"/>
                <!-- Left tower -->
                <rect x="80" y="100" width="16" height="120" rx="2" fill="rgba(34, 211, 238, 0.25)" stroke="rgba(34, 211, 238, 0.4)" stroke-width="1"/>
                <!-- Right tower -->
                <rect x="300" y="100" width="16" height="120" rx="2" fill="rgba(34, 211, 238, 0.25)" stroke="rgba(34, 211, 238, 0.4)" stroke-width="1"/>
                <!-- Cables left -->
                <line x1="88" y1="105" x2="30" y2="220" stroke="rgba(34, 211, 238, 0.3)" stroke-width="2"/>
                <line x1="88" y1="105" x2="60" y2="220" stroke="rgba(34, 211, 238, 0.2)" stroke-width="1.5"/>
                <line x1="88" y1="105" x2="120" y2="220" stroke="rgba(34, 211, 238, 0.2)" stroke-width="1.5"/>
                <line x1="88" y1="105" x2="150" y2="220" stroke="rgba(34, 211, 238, 0.15)" stroke-width="1"/>
                <!-- Cables right -->
                <line x1="308" y1="105" x2="370" y2="220" stroke="rgba(34, 211, 238, 0.3)" stroke-width="2"/>
                <line x1="308" y1="105" x2="340" y2="220" stroke="rgba(34, 211, 238, 0.2)" stroke-width="1.5"/>
                <line x1="308" y1="105" x2="280" y2="220" stroke="rgba(34, 211, 238, 0.2)" stroke-width="1.5"/>
                <line x1="308" y1="105" x2="250" y2="220" stroke="rgba(34, 211, 238, 0.15)" stroke-width="1"/>
                <!-- Main cable -->
                <path d="M 30 140 Q 200 50 370 140" stroke="rgba(34, 211, 238, 0.5)" stroke-width="3" fill="none"/>
                <!-- Water -->
                <path d="M 0 300 Q 50 285 100 300 Q 150 315 200 300 Q 250 285 300 300 Q 350 315 400 300" stroke="rgba(34, 211, 238, 0.15)" stroke-width="2" fill="none"/>
                <path d="M 0 320 Q 50 305 100 320 Q 150 335 200 320 Q 250 305 300 320 Q 350 335 400 320" stroke="rgba(34, 211, 238, 0.1)" stroke-width="1.5" fill="none"/>
            </svg>
        </div>

        <div class="quote-side">
            <span class="section-label">Inżynieria tolerancji</span>
            <div class="big-quote">Jakie są <span class="highlight">tolerancje</span>?</div>
            <p class="quote-desc">Projektowanie pod nieidealne warunki. Most wytrzymuje więcej niż nominalne obciążenie - system musi tolerować nieprzewidywalne zachowania komponentów.</p>
            <div class="quote-author">Inspiracja: <strong>Martin Fowler</strong></div>
        </div>
    </div>

    <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

    <div class="camera-box">
        kamera 480 &times; 270
    </div>
</div>

<script>
    (function () {
        const stage = document.getElementById('stage');
        function rescale() {
            const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
            stage.style.transformOrigin = 'top left';
            stage.style.transform = 'scale(' + scale + ')';
            stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
            stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
        }
        window.addEventListener('resize', rescale);
        rescale();
    })();
</script>
</body>
</html>
