<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 15 - Tolerancje: Lekcja z Inżynierii</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --amber-400: #fbbf24;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            width: 1500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -80px;
        }

        .source-tag {
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        h2.title {
            font-size: 50px;
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 48px;
            text-align: center;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        /* Main layout */
        .columns {
            display: flex;
            gap: 40px;
            width: 100%;
            align-items: stretch;
        }

        /* Left: quote / anecdote */
        .quote-panel {
            flex: 0 0 560px;
            background: rgba(251, 191, 36, 0.04);
            border: 1px solid rgba(251, 191, 36, 0.15);
            border-radius: 24px;
            padding: 44px 40px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.4s forwards;
        }

        .quote-header {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .quote-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: var(--amber-400);
        }

        .quote-author {
            font-size: 20px;
            font-weight: 700;
            color: var(--amber-400);
        }

        .quote-role {
            font-size: 15px;
            color: var(--text-muted);
        }

        .anecdote {
            font-size: 19px;
            color: var(--text-muted);
            line-height: 1.65;
            border-left: 3px solid rgba(251, 191, 36, 0.3);
            padding-left: 20px;
        }

        .anecdote strong {
            color: var(--amber-400);
        }

        .bridge-quote {
            font-size: 28px;
            font-weight: 700;
            color: var(--amber-400);
            font-style: italic;
            line-height: 1.3;
        }

        .bridge-quote::before {
            content: "\201E";
            font-size: 40px;
            color: rgba(251, 191, 36, 0.4);
            margin-right: 4px;
        }

        .bridge-quote::after {
            content: "\201D";
            font-size: 40px;
            color: rgba(251, 191, 36, 0.4);
            margin-left: 4px;
        }

        /* Right: parallel + key question */
        .right-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .parallel-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 32px 32px;
            display: flex;
            align-items: flex-start;
            gap: 20px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .parallel-card:nth-child(1) { animation: fadeUp 0.8s ease-out 0.6s forwards; }
        .parallel-card:nth-child(2) { animation: fadeUp 0.8s ease-out 0.8s forwards; }

        .parallel-card:hover {
            border-color: var(--cyan-500);
            transform: translateX(6px);
            box-shadow: 0 4px 20px rgba(6, 182, 212, 0.1);
        }

        .par-icon {
            width: 48px;
            height: 48px;
            min-width: 48px;
            border-radius: 12px;
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--cyan-400);
        }

        .par-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .par-title {
            font-size: 21px;
            font-weight: 700;
            color: #ffffff;
        }

        .par-desc {
            font-size: 17px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .par-desc .cyan {
            color: var(--cyan-400);
            font-weight: 600;
        }

        /* Key question box */
        .key-question {
            background: rgba(6, 182, 212, 0.06);
            border: 2px solid rgba(6, 182, 212, 0.25);
            border-radius: 20px;
            padding: 36px 36px;
            text-align: center;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 1.0s forwards;
        }

        .kq-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--cyan-400);
            font-weight: 600;
            margin-bottom: 14px;
        }

        .kq-text {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.4;
        }

        .kq-text .cyan {
            color: var(--cyan-400);
            text-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }

        .kq-text .amber {
            color: var(--amber-400);
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.08;
            z-index: 0;
        }

        .accent-amber {
            position: absolute;
            background: var(--amber-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.06;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent-amber" style="width: 450px; height: 450px; top: 5%; left: 5%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 15%; right: 10%;"></div>

        <div class="content">
            <span class="source-tag">Martin Fowler</span>
            <h2 class="title">Jakie są <span class="highlight">tolerancje</span>?</h2>

            <div class="columns">
                <!-- Left: Anecdote -->
                <div class="quote-panel">
                    <div class="quote-header">
                        <div class="quote-icon"><i class="ti ti-building-bridge-2"></i></div>
                        <div>
                            <div class="quote-author">Anegdota  Martina Fowlera</div>
                        </div>
                    </div>

                    <span class="bridge-quote">Świat jest nieprzewidywalny i projekt musi to uwzględniać</span>
                </div>

                <!-- Right: Parallels + Question -->
                <div class="right-col">

                    <div class="key-question">
                        <div class="kq-label">Kluczowe pytanie architekta</div>
                        <div class="kq-text">
                            Gdzie mogę pozwolić sobie na <span class="cyan">niedeterminizm</span>,<br>
                            a gdzie <span class="amber">absolutnie nie</span>?
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
