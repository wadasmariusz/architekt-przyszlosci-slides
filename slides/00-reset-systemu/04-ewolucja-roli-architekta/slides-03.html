<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 03 — Era Mainframów</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 70%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            width: 1500px;
            display: flex;
            align-items: center;
            gap: 80px;
        }

        .text-side {
            flex: 1;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.3s forwards;
        }

        .era-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .text-side h2 {
            font-size: 64px;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.1;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .text-side h2 .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        .role-tag {
            display: inline-block;
            font-size: 20px;
            color: var(--cyan-400);
            font-weight: 600;
            padding: 8px 24px;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 100px;
            border: 1px solid rgba(6, 182, 212, 0.2);
            margin-bottom: 28px;
        }

        .text-side p {
            font-size: 24px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 36px;
        }

        .info-box {
            padding: 24px 32px;
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 16px;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.2s forwards;
        }

        .info-box .info-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--cyan-400);
            margin-bottom: 8px;
        }

        .info-box .info-text {
            font-size: 20px;
            color: var(--text-muted);
        }

        /* Right visual - mainframe icon */
        .visual-side {
            flex-shrink: 0;
            width: 400px;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.6s forwards;
        }

        .mainframe-icon {
            width: 300px;
            height: 400px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            backdrop-filter: blur(12px);
        }

        .mainframe-icon i {
            font-size: 120px;
            color: var(--cyan-400);
            opacity: 0.6;
        }

        .mainframe-icon span {
            font-size: 20px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.1;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 500px; height: 500px; top: 10%; right: 5%;"></div>

        <div class="content">
            <div class="text-side">
                <span class="era-label">Era Mainframów</span>
                <h2>Era <span class="highlight">Mainframów</span></h2>
                <span class="role-tag">Rola: Główny Programista</span>
                <p>Decyzje podejmowane przez najbardziej doświadczonego inżyniera, który rozumiał fizyczne ograniczenia maszyny.</p>
                <div class="info-box">
                    <div class="info-title">Zasada 4KB</div>
                    <div class="info-text">Optymalizacja zasobów jako fundament myślenia inżynierskiego</div>
                </div>
            </div>

            <div class="visual-side">
                <div class="mainframe-icon">
                    <i class="ti ti-cpu"></i>
                    <span>Mainframe</span>
                </div>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
