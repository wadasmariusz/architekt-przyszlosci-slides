<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 08 — Nowy Paradygmat - Niedeterminizm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            width: 1500px;
            display: flex;
            gap: 0;
            height: 600px;
        }

        /* Left panel - light */
        .panel-left {
            flex: 1;
            background: rgba(248, 250, 252, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px 0 0 24px;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 24px;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.3s forwards;
        }

        .big-number {
            font-size: 160px;
            font-weight: 900;
            color: var(--text-muted);
            line-height: 1;
            letter-spacing: -4px;
        }

        .big-label {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .panel-left .desc {
            font-size: 22px;
            color: rgba(148, 163, 184, 0.7);
            line-height: 1.5;
        }

        .panel-left .desc strong {
            color: var(--text-muted);
        }

        /* Right panel - dark/cyan */
        .panel-right {
            flex: 1;
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 0 24px 24px 0;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 24px;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.6s forwards;
        }

        .panel-right .era-tag {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--cyan-400);
            font-weight: 600;
        }

        .panel-right h2 {
            font-size: 56px;
            font-weight: 800;
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
            line-height: 1.1;
        }

        .panel-right .desc {
            font-size: 22px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .panel-right .desc strong {
            color: var(--cyan-400);
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.1;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>

        <div class="accent" style="width: 500px; height: 500px; top: 15%; left: 10%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 10%; right: 15%;"></div>

        <div class="content">
            <div class="panel-left">
                <span class="big-number">60</span>
                <span class="big-label">Lat Determinizmu</span>
                <p class="desc">Ten sam input = <strong>ten sam output</strong>. Przez dekady fundamentalna zasada programowania.</p>
            </div>

            <div class="panel-right">
                <span class="era-tag">Nowy paradygmat</span>
                <h2>Era LLM</h2>
                <p class="desc"><strong>Niedeterminizm</strong> jako cecha, a nie błąd. Ten sam prompt może dać różne odpowiedzi.</p>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
