<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 06 - Skala Zmienia Wszystko</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Full-screen network background */
        .network-bg {
            position: absolute;
            inset: 0;
            z-index: 1;
            overflow: hidden;
        }

        .network-node {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--cyan-400);
            border-radius: 50%;
            opacity: 0.3;
        }

        .network-node::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 200px;
            height: 1px;
            background: linear-gradient(to right, rgba(34, 211, 238, 0.2), transparent);
            transform-origin: 0 0;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        /* Dark overlay */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(3, 7, 18, 0.7);
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 1200px;
        }

        h2.big-title {
            font-size: 96px;
            font-weight: 800;
            line-height: 1.1;
            color: #ffffff;
            margin-bottom: 48px;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.3s forwards;
            letter-spacing: -3px;
        }

        h2.big-title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 40px rgba(6, 182, 212, 0.5);
        }

        .desc {
            font-size: 28px;
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 900px;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.8s forwards;
        }

        .desc strong {
            color: var(--cyan-400);
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>

        <div class="network-bg">
            <div class="network-node" style="top: 10%; left: 15%; transform: rotate(25deg);"></div>
            <div class="network-node" style="top: 25%; left: 60%; transform: rotate(-15deg);"></div>
            <div class="network-node" style="top: 40%; left: 30%; transform: rotate(45deg);"></div>
            <div class="network-node" style="top: 55%; left: 75%; transform: rotate(-30deg);"></div>
            <div class="network-node" style="top: 70%; left: 20%; transform: rotate(10deg);"></div>
            <div class="network-node" style="top: 80%; left: 50%; transform: rotate(-45deg);"></div>
            <div class="network-node" style="top: 15%; left: 85%; transform: rotate(60deg);"></div>
            <div class="network-node" style="top: 65%; left: 45%; transform: rotate(-20deg);"></div>
        </div>

        <div class="overlay"></div>

        <div class="accent" style="width: 600px; height: 600px; top: 20%; left: 30%;"></div>

        <div class="content">
            <h2 class="big-title">Skala zmienia <span class="highlight">wszystko</span></h2>
            <p class="desc">Firmy takie jak <strong>Amazon</strong> i <strong>eBay</strong> odkryły, że architektura to nie statyczny plan - to <strong>żywy organizm</strong>, który musi ewoluować wraz ze wzrostem skali.</p>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
