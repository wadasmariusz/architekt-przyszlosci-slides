<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide — Szablon prezentacji</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="stage" id="stage">
        <div class="background">
            <div class="bg-grid"></div>
            <div class="bg-glow"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="corner corner--tl"></div>
            <div class="corner corner--br"></div>
        </div>

        <!-- CONTENT — replace this per slide -->
        <div class="content">
            <span class="module-label">Szablon</span>
            <h1 class="title">
                Tytuł <span class="highlight">slajdu</span>
            </h1>
            <p class="subtitle">
                Opis lub podtytuł slajdu — zamień tę sekcję na właściwą treść.
            </p>
            <hr class="divider">
        </div>

        <div class="camera-box">
            <div class="camera-box__placeholder">kamera 480 &times; 270</div>
        </div>

        <div class="overlay"></div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                stage.style.transform = 'scale(' + Math.min(innerWidth / 1920, innerHeight / 1080) + ')';
            }
            addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
