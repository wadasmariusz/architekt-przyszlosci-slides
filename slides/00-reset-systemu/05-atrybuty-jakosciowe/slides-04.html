<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 04 - Góra lodowa wymagań</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-top: -40px;
        }

        .section-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        h2.title {
            font-size: 60px;
            font-weight: 800;
            margin-bottom: 64px;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        /* CSS Iceberg */
        .iceberg-container {
            position: relative;
            width: 600px;
            height: 520px;
            opacity: 0;
            animation: fadeIn 1.2s ease-out 0.5s forwards;
        }

        /* Water line */
        .waterline {
            position: absolute;
            top: 160px;
            left: -200px;
            right: -200px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.4), transparent);
        }

        .water-fill {
            position: absolute;
            top: 162px;
            left: -200px;
            right: -200px;
            bottom: 0;
            background: linear-gradient(180deg, rgba(6, 182, 212, 0.06), rgba(6, 182, 212, 0.02));
            pointer-events: none;
        }

        /* Tip above water */
        .iceberg-tip {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 80px solid transparent;
            border-right: 80px solid transparent;
            border-bottom: 120px solid rgba(255, 255, 255, 0.15);
        }

        /* Body below water */
        .iceberg-body {
            position: absolute;
            top: 160px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 340px;
            background: linear-gradient(180deg, rgba(6, 182, 212, 0.15), rgba(6, 182, 212, 0.05));
            clip-path: polygon(10% 0%, 90% 0%, 100% 30%, 85% 60%, 95% 80%, 60% 100%, 40% 100%, 5% 80%, 15% 60%, 0% 30%);
        }

        /* Labels */
        .label-above {
            position: absolute;
            top: 70px;
            right: -280px;
            font-size: 28px;
            font-weight: 600;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeIn 0.8s ease-out 1s forwards;
        }

        .label-below {
            position: absolute;
            top: 300px;
            right: -340px;
            font-size: 32px;
            font-weight: 700;
            color: var(--cyan-400);
            text-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
            opacity: 0;
            animation: fadeIn 0.8s ease-out 1.3s forwards;
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.1;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>

        <div class="accent" style="width: 600px; height: 600px; bottom: 10%; left: 5%;"></div>

        <div class="content">
            <span class="section-label">Metafora</span>
            <h2 class="title">Wymagania systemu</h2>

            <div class="iceberg-container">
                <div class="iceberg-tip"></div>
                <div class="waterline"></div>
                <div class="water-fill"></div>
                <div class="iceberg-body"></div>
                <span class="label-above">Funkcjonalności</span>
                <span class="label-below">Atrybuty jakościowe</span>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
