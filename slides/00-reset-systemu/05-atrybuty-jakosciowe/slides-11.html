<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 11 - arc42</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 1400px;
            margin-top: -60px;
        }

        .badge {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        h2.title {
            font-size: 80px;
            font-weight: 800;
            margin-bottom: 64px;
            color: var(--cyan-400);
            text-shadow: 0 0 40px rgba(6, 182, 212, 0.5);
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -2px;
        }

        .features {
            display: flex;
            gap: 48px;
            margin-bottom: 48px;
        }

        .feature {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 340px;
            padding: 40px 32px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .feature:nth-child(1) { animation: fadeUp 0.7s ease-out 0.5s forwards; }
        .feature:nth-child(2) { animation: fadeUp 0.7s ease-out 0.7s forwards; }
        .feature:nth-child(3) { animation: fadeUp 0.7s ease-out 0.9s forwards; }

        .feature:hover {
            border-color: var(--cyan-500);
            transform: translateY(-8px);
            box-shadow: 0 8px 32px rgba(6, 182, 212, 0.15);
        }

        .feature-icon {
            font-size: 44px;
            color: var(--cyan-400);
        }

        .feature-text {
            font-size: 22px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.1;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 500px; height: 500px; top: 10%; left: 5%;"></div>

        <div class="content">
            <span class="badge">Framework</span>
            <h2 class="title">arc42</h2>

            <div class="features">
                <div class="feature">
                    <i class="ti ti-file-text feature-icon"></i>
                    <span class="feature-text">Framework dokumentacji architektury</span>
                </div>
                <div class="feature">
                    <i class="ti ti-tags feature-icon"></i>
                    <span class="feature-text">Definicje atrybutów jakościowych</span>
                </div>
                <div class="feature">
                    <i class="ti ti-template feature-icon"></i>
                    <span class="feature-text">Gotowa struktura</span>
                </div>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
