<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 08 - Core: gdzie inwestować</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --cyan-600: #0891b2;
            --cyan-700: #0e7490;
            --cyan-900: #164e63;
            --dark-bg: #0a0e17;
            --dark-surface: #111827;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--dark-bg);
            color: #f0f4f8;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(6,182,212,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6,182,212,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0%   { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }

        .bg-glow {
            position: absolute;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(6,182,212,0.12) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: bgpulse 6s ease-in-out infinite;
        }

        @keyframes bgpulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50%      { transform: translate(-50%, -50%) scale(1.15); opacity: 0.9; }
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--cyan-400);
            opacity: 0;
            animation: float 8s ease-in-out infinite;
        }

        .particle:nth-child(3) { top: 12%; left: 10%; animation-delay: 0s; }
        .particle:nth-child(4) { top: 68%; left: 85%; animation-delay: 1.5s; }
        .particle:nth-child(5) { top: 20%; left: 76%; animation-delay: 3s; }
        .particle:nth-child(6) { top: 80%; left: 14%; animation-delay: 4.5s; }
        .particle:nth-child(7) { top: 48%; left: 50%; animation-delay: 6s; }
        .particle:nth-child(8) { top: 14%; left: 60%; animation-delay: 2s; }

        @keyframes float {
            0%   { opacity: 0; transform: translateY(0) scale(1); }
            20%  { opacity: 0.8; }
            80%  { opacity: 0.8; }
            100% { opacity: 0; transform: translateY(-120px) scale(0.5); }
        }

        .corner {
            position: absolute;
            width: 60px;
            height: 60px;
            z-index: 1;
        }

        .corner::before,
        .corner::after {
            content: '';
            position: absolute;
            background: var(--cyan-700);
        }

        .corner--tl { top: 30px; left: 30px; }
        .corner--tl::before { width: 24px; height: 2px; top: 0; left: 0; }
        .corner--tl::after  { width: 2px; height: 24px; top: 0; left: 0; }

        .corner--br { bottom: 30px; right: 30px; }
        .corner--br::before { width: 24px; height: 2px; bottom: 0; right: 0; }
        .corner--br::after  { width: 2px; height: 24px; bottom: 0; right: 0; }

        /* === Content === */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            max-width: 1100px;
            padding: 0 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section-title {
            font-size: clamp(1.4rem, 3vw, 2.2rem);
            font-weight: 800;
            margin-bottom: 3rem;
            line-height: 1.4;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.3s forwards;
        }

        .section-title .highlight {
            background: linear-gradient(135deg, var(--cyan-400), var(--cyan-600));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* === Main layout: heatmap left + list right === */
        .main-layout {
            display: flex;
            align-items: center;
            gap: 4rem;
            width: 100%;
        }

        /* === Heatmap grid === */
        .heatmap {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            grid-template-rows: repeat(3, 70px);
            gap: 8px;
            flex-shrink: 0;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 0.5s forwards;
        }

        .heat-cell {
            border-radius: 10px;
            opacity: 0;
            position: relative;
        }

        /* Dim cells — other areas */
        .heat-cell--dim {
            background: rgba(30,41,59,0.7);
            border: 1px solid rgba(100,116,139,0.12);
        }

        .heat-cell--dim:nth-child(1)  { animation: dimLight 0.5s ease-out 0.8s forwards; }
        .heat-cell--dim:nth-child(2)  { animation: dimLight 0.5s ease-out 0.95s forwards; }
        .heat-cell--dim:nth-child(3)  { animation: dimLight 0.5s ease-out 1.1s forwards; }
        .heat-cell--dim:nth-child(5)  { animation: dimLight 0.5s ease-out 1.25s forwards; }
        .heat-cell--dim:nth-child(6)  { animation: dimLight 0.5s ease-out 1.4s forwards; }
        .heat-cell--dim:nth-child(8)  { animation: dimLight 0.5s ease-out 1.55s forwards; }
        .heat-cell--dim:nth-child(9)  { animation: dimLight 0.5s ease-out 1.7s forwards; }
        .heat-cell--dim:nth-child(10) { animation: dimLight 0.5s ease-out 1.85s forwards; }
        .heat-cell--dim:nth-child(11) { animation: dimLight 0.5s ease-out 2.0s forwards; }
        .heat-cell--dim:nth-child(12) { animation: dimLight 0.5s ease-out 2.15s forwards; }

        @keyframes dimLight {
            from { opacity: 0; }
            to   { opacity: 0.5; }
        }

        /* Core cell — bright burst */
        .heat-cell--core {
            grid-column: 4;
            grid-row: 1 / 3;
            height: 100%;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--cyan-400), var(--cyan-600));
            border: 2px solid var(--cyan-400);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: coreBurst 0.7s ease-out 2.4s forwards;
            box-shadow: 0 0 0 rgba(34,211,238,0);
        }

        .heat-cell--core .core-label {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--dark-bg);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes coreBurst {
            0%   { opacity: 0; transform: scale(0.7); box-shadow: 0 0 0 rgba(34,211,238,0); }
            60%  { opacity: 1; transform: scale(1.08); box-shadow: 0 0 50px rgba(34,211,238,0.5); }
            100% { opacity: 1; transform: scale(1); box-shadow: 0 0 30px rgba(34,211,238,0.3); }
        }

        /* === Investment list === */
        .invest-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            text-align: left;
            flex: 1;
        }

        .invest-item {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            padding: 1.2rem 1.8rem;
            border-radius: 16px;
            background: rgba(17,24,39,0.7);
            border: 1px solid rgba(6,182,212,0.15);
            backdrop-filter: blur(8px);
            opacity: 0;
            transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
        }

        .invest-item:hover {
            border-color: var(--cyan-500);
            transform: translateY(-4px);
            box-shadow: 0 6px 24px rgba(6,182,212,0.12);
        }

        .invest-item:nth-child(1) { animation: fadeUp 0.8s ease-out 2.8s forwards; }
        .invest-item:nth-child(2) { animation: fadeUp 0.8s ease-out 3.1s forwards; }
        .invest-item:nth-child(3) { animation: fadeUp 0.8s ease-out 3.4s forwards; }

        .invest-icon {
            font-size: 1.8rem;
            line-height: 1;
            flex-shrink: 0;
        }

        .invest-text {
            font-size: 1.05rem;
            font-weight: 600;
            color: #f0f4f8;
            line-height: 1.4;
        }

        .invest-text .sub {
            display: block;
            font-size: 0.82rem;
            font-weight: 300;
            color: #64748b;
            margin-top: 0.2rem;
        }

        /* === Animations === */
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

        <div class="corner corner--tl"></div>
        <div class="corner corner--br"></div>

        <div class="content">
            <h2 class="section-title">Core to nie to, co firma robi najwięcej.<br>To to, co robi <span class="highlight">inaczej.</span></h2>

            <div class="main-layout">
                <!-- Heatmap -->
                <div class="heatmap">
                    <div class="heat-cell heat-cell--dim"></div>
                    <div class="heat-cell heat-cell--dim"></div>
                    <div class="heat-cell heat-cell--dim"></div>
                    <div class="heat-cell heat-cell--core">
                        <span class="core-label">Core</span>
                    </div>
                    <div class="heat-cell heat-cell--dim"></div>
                    <div class="heat-cell heat-cell--dim"></div>
                    <!-- core spans row 1-2, col 4 -->
                    <div class="heat-cell heat-cell--dim"></div>
                    <div class="heat-cell heat-cell--dim"></div>
                    <div class="heat-cell heat-cell--dim"></div>
                    <div class="heat-cell heat-cell--dim"></div>
                </div>

                <!-- Investment list -->
                <div class="invest-list">
                    <div class="invest-item">
                        <span class="invest-icon">🧠</span>
                        <span class="invest-text">Najlepsi ludzie
                            <span class="sub">Seniorzy, domain experci, dedykowane zespoły</span>
                        </span>
                    </div>
                    <div class="invest-item">
                        <span class="invest-icon">⏳</span>
                        <span class="invest-text">Najwięcej czasu
                            <span class="sub">Iteracje, eksperymenty, głęboka analiza</span>
                        </span>
                    </div>
                    <div class="invest-item">
                        <span class="invest-icon">🏗️</span>
                        <span class="invest-text">Najgłębsze modele domenowe
                            <span class="sub">Pełna moc taktycznego DDD</span>
                        </span>
                    </div>
                </div>
            </div>
        </div>
        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
