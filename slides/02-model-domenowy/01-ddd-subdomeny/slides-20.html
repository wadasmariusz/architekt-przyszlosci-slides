<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 20 - Zakończenie</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --cyan-600: #0891b2;
            --cyan-700: #0e7490;
            --cyan-900: #164e63;
            --dark-bg: #0a0e17;
            --dark-surface: #111827;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--dark-bg);
            color: #f0f4f8;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(6,182,212,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6,182,212,0.04) 1px, transparent 1px);
            background-size: 60px 60px; animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 60px 60px; } }

        .bg-glow {
            position: absolute; width: 700px; height: 700px; border-radius: 50%;
            background: radial-gradient(circle, rgba(6,182,212,0.12) 0%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            animation: bgpulse 6s ease-in-out infinite;
        }
        @keyframes bgpulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50%      { transform: translate(-50%, -50%) scale(1.15); opacity: 0.9; }
        }

        .particle {
            position: absolute; width: 4px; height: 4px; border-radius: 50%;
            background: var(--cyan-400); opacity: 0; animation: float 8s ease-in-out infinite;
        }
        .particle:nth-child(3) { top: 12%; left: 10%; animation-delay: 0s; }
        .particle:nth-child(4) { top: 68%; left: 84%; animation-delay: 1.5s; }
        .particle:nth-child(5) { top: 24%; left: 78%; animation-delay: 3s; }
        .particle:nth-child(6) { top: 80%; left: 16%; animation-delay: 4.5s; }
        .particle:nth-child(7) { top: 50%; left: 48%; animation-delay: 6s; }
        .particle:nth-child(8) { top: 16%; left: 56%; animation-delay: 2s; }

        @keyframes float {
            0%   { opacity: 0; transform: translateY(0) scale(1); }
            20%  { opacity: 0.8; } 80% { opacity: 0.8; }
            100% { opacity: 0; transform: translateY(-120px) scale(0.5); }
        }

        .corner { position: absolute; width: 60px; height: 60px; z-index: 1; }
        .corner::before, .corner::after { content: ''; position: absolute; background: var(--cyan-700); }
        .corner--tl { top: 30px; left: 30px; }
        .corner--tl::before { width: 24px; height: 2px; top: 0; left: 0; }
        .corner--tl::after  { width: 2px; height: 24px; top: 0; left: 0; }
        .corner--br { bottom: 30px; right: 30px; }
        .corner--br::before { width: 24px; height: 2px; bottom: 0; right: 0; }
        .corner--br::after  { width: 2px; height: 24px; bottom: 0; right: 0; }

        /* === Content === */
        .content {
            position: relative; z-index: 10; text-align: center;
            width: 100%; max-width: 1100px; padding: 0 3rem;
            display: flex; flex-direction: column; align-items: center;
        }

        /* === Map pieces — callback to slide 01, now classified === */
        .map-container {
            display: flex;
            gap: 12px;
            margin-bottom: 3rem;
        }

        .map-piece {
            border-radius: 10px;
            opacity: 0;
            position: relative;
            /* Start grey, then light up */
            background: rgba(30,41,59,0.6) !important;
            border: 1px solid rgba(100,116,139,0.15);
        }

        .map-piece:nth-child(1) { width: 70px; height: 90px; animation: lightUp 0.6s ease-out 0.5s forwards; }
        .map-piece:nth-child(2) { width: 100px; height: 70px; align-self: flex-end; animation: lightUp 0.6s ease-out 0.8s forwards; }
        .map-piece:nth-child(3) { width: 55px; height: 110px; animation: lightUpCore 0.8s ease-out 1.1s forwards; }
        .map-piece:nth-child(4) { width: 85px; height: 60px; align-self: center; animation: lightUp 0.6s ease-out 1.4s forwards; }
        .map-piece:nth-child(5) { width: 65px; height: 80px; align-self: flex-end; animation: lightUpGeneric 0.6s ease-out 1.7s forwards; }
        .map-piece:nth-child(6) { width: 90px; height: 95px; animation: lightUp 0.6s ease-out 2.0s forwards; }
        .map-piece:nth-child(7) { width: 50px; height: 65px; align-self: center; animation: lightUpGeneric 0.6s ease-out 2.3s forwards; }

        /* Core piece — bright cyan glow */
        @keyframes lightUpCore {
            0%   { opacity: 0; background: rgba(30,41,59,0.6); border-color: rgba(100,116,139,0.15); box-shadow: none; }
            100% {
                opacity: 1;
                background: linear-gradient(135deg, var(--cyan-400), var(--cyan-600)) !important;
                border-color: var(--cyan-400) !important;
                box-shadow: 0 0 30px rgba(34,211,238,0.4);
            }
        }

        /* Supporting — muted cyan */
        @keyframes lightUp {
            0%   { opacity: 0; background: rgba(30,41,59,0.6); border-color: rgba(100,116,139,0.15); }
            100% {
                opacity: 1;
                background: rgba(6,182,212,0.12) !important;
                border-color: rgba(6,182,212,0.3) !important;
            }
        }

        /* Generic — grey */
        @keyframes lightUpGeneric {
            0%   { opacity: 0; background: rgba(30,41,59,0.6); border-color: rgba(100,116,139,0.15); }
            100% {
                opacity: 1;
                background: rgba(100,116,139,0.15) !important;
                border-color: rgba(100,116,139,0.25) !important;
            }
        }

        /* Tiny labels on pieces */
        .map-piece span {
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            opacity: 0;
            animation: fadeIn 0.4s ease-out 2.6s forwards;
        }

        .map-piece:nth-child(3) span { color: var(--dark-bg); }
        .map-piece:nth-child(1) span,
        .map-piece:nth-child(2) span,
        .map-piece:nth-child(4) span,
        .map-piece:nth-child(6) span { color: var(--cyan-400); }
        .map-piece:nth-child(5) span,
        .map-piece:nth-child(7) span { color: #64748b; }

        /* === Title === */
        h1.title {
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 2.8s forwards;
            letter-spacing: -1px;
        }

        h1.title .highlight {
            background: linear-gradient(135deg, var(--cyan-400), var(--cyan-600));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .subtitle {
            font-size: clamp(1rem, 1.8vw, 1.3rem);
            color: #94a3b8;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 3.2s forwards;
        }

        .subtitle strong {
            color: var(--cyan-400);
            font-weight: 600;
        }

        /* Next lesson chip */
        .next-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.7rem 1.8rem;
            border-radius: 100px;
            background: rgba(6,182,212,0.08);
            border: 1px solid rgba(6,182,212,0.25);
            opacity: 0;
            animation: fadeUp 0.8s ease-out 3.6s forwards;
        }

        .next-chip .icon { font-size: 1.1rem; }

        .next-chip .text {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--cyan-400);
            letter-spacing: 1px;
        }

        /* === Animations === */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

        <div class="corner corner--tl"></div>
        <div class="corner corner--br"></div>

        <div class="content">
            <!-- Map pieces from slide 01 — now classified -->
            <div class="map-container">
                <div class="map-piece"><span>Supporting</span></div>
                <div class="map-piece"><span>Supporting</span></div>
                <div class="map-piece"><span>Core</span></div>
                <div class="map-piece"><span>Supporting</span></div>
                <div class="map-piece"><span>Generic</span></div>
                <div class="map-piece"><span>Supporting</span></div>
                <div class="map-piece"><span>Generic</span></div>
            </div>

            <h1 class="title">Teraz umiesz <span class="highlight">odczytać mapę.</span></h1>
            <p class="subtitle">Dziękuję!</p>

            <div class="next-chip">
                <span class="icon">→</span>
                <span class="text">Następna lekcja: Bounded Contexts</span>
            </div>
        </div>
        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
