<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 13 - Klasyfikacja = alokacja zasobów</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --cyan-600: #0891b2;
            --cyan-700: #0e7490;
            --cyan-900: #164e63;
            --dark-bg: #0a0e17;
            --dark-surface: #111827;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--dark-bg);
            color: #f0f4f8;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(6,182,212,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6,182,212,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 60px 60px; } }

        .bg-glow {
            position: absolute; width: 700px; height: 700px; border-radius: 50%;
            background: radial-gradient(circle, rgba(6,182,212,0.12) 0%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            animation: bgpulse 6s ease-in-out infinite;
        }
        @keyframes bgpulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50%      { transform: translate(-50%, -50%) scale(1.15); opacity: 0.9; }
        }

        .particle {
            position: absolute; width: 4px; height: 4px; border-radius: 50%;
            background: var(--cyan-400); opacity: 0;
            animation: float 8s ease-in-out infinite;
        }
        .particle:nth-child(3) { top: 10%; left: 16%; animation-delay: 0s; }
        .particle:nth-child(4) { top: 72%; left: 80%; animation-delay: 1.5s; }
        .particle:nth-child(5) { top: 20%; left: 78%; animation-delay: 3s; }
        .particle:nth-child(6) { top: 84%; left: 12%; animation-delay: 4.5s; }
        .particle:nth-child(7) { top: 48%; left: 48%; animation-delay: 6s; }
        .particle:nth-child(8) { top: 16%; left: 58%; animation-delay: 2s; }

        @keyframes float {
            0%   { opacity: 0; transform: translateY(0) scale(1); }
            20%  { opacity: 0.8; } 80% { opacity: 0.8; }
            100% { opacity: 0; transform: translateY(-120px) scale(0.5); }
        }

        .corner { position: absolute; width: 60px; height: 60px; z-index: 1; }
        .corner::before, .corner::after { content: ''; position: absolute; background: var(--cyan-700); }
        .corner--tl { top: 30px; left: 30px; }
        .corner--tl::before { width: 24px; height: 2px; top: 0; left: 0; }
        .corner--tl::after  { width: 2px; height: 24px; top: 0; left: 0; }
        .corner--br { bottom: 30px; right: 30px; }
        .corner--br::before { width: 24px; height: 2px; bottom: 0; right: 0; }
        .corner--br::after  { width: 2px; height: 24px; bottom: 0; right: 0; }

        /* === Content === */
        .content {
            position: relative; z-index: 10; text-align: center;
            width: 100%; max-width: 1100px; padding: 0 3rem;
            display: flex; flex-direction: column; align-items: center;
        }

        .section-title {
            font-size: clamp(1.5rem, 3.2vw, 2.4rem);
            font-weight: 800; margin-bottom: 3rem;
            opacity: 0; animation: fadeUp 0.8s ease-out 0.3s forwards;
        }

        .section-title .highlight {
            background: linear-gradient(135deg, var(--cyan-400), var(--cyan-600));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* === Three columns === */
        .columns {
            display: flex;
            gap: 1.8rem;
            width: 100%;
        }

        .col {
            flex: 1;
            border-radius: 16px;
            background: rgba(17,24,39,0.7);
            border: 1px solid rgba(100,116,139,0.15);
            backdrop-filter: blur(8px);
            padding: 1.5rem 1.2rem 1.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            opacity: 0;
        }

        .col--core {
            border-color: rgba(6,182,212,0.3);
            background: rgba(6,182,212,0.05);
            animation: fadeUp 0.8s ease-out 0.6s forwards;
        }

        .col--supporting {
            animation: fadeUp 0.8s ease-out 0.9s forwards;
        }

        .col--generic {
            animation: fadeUp 0.8s ease-out 1.2s forwards;
        }

        .col-header {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .col--core .col-header { color: var(--cyan-400); }
        .col--supporting .col-header { color: #cbd5e1; }
        .col--generic .col-header { color: #94a3b8; }

        /* === Bar chart rows === */
        .metric {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .metric-label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.72rem;
            font-weight: 600;
            color: #64748b;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .metric-label .icon {
            font-size: 0.9rem;
        }

        .bar-track {
            width: 100%;
            height: 26px;
            border-radius: 8px;
            background: rgba(15,23,42,0.6);
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--dark-bg);
            letter-spacing: 0.5px;
            transform: scaleX(0);
            transform-origin: left;
        }

        /* Core bars */
        .col--core .bar-fill {
            background: linear-gradient(90deg, var(--cyan-500), var(--cyan-400));
        }
        .col--core .metric:nth-child(2) .bar-fill { width: 95%; animation: growBar 0.8s ease-out 1.4s forwards; }
        .col--core .metric:nth-child(3) .bar-fill { width: 90%; animation: growBar 0.8s ease-out 1.6s forwards; }
        .col--core .metric:nth-child(4) .bar-fill { width: 100%; animation: growBar 0.8s ease-out 1.8s forwards; }

        /* Supporting bars */
        .col--supporting .bar-fill {
            background: linear-gradient(90deg, #64748b, #94a3b8);
        }
        .col--supporting .metric:nth-child(2) .bar-fill { width: 55%; animation: growBar 0.8s ease-out 2.0s forwards; }
        .col--supporting .metric:nth-child(3) .bar-fill { width: 50%; animation: growBar 0.8s ease-out 2.2s forwards; }
        .col--supporting .metric:nth-child(4) .bar-fill { width: 60%; animation: growBar 0.8s ease-out 2.4s forwards; }

        /* Generic bars */
        .col--generic .bar-fill {
            background: linear-gradient(90deg, #475569, #64748b);
        }
        .col--generic .metric:nth-child(2) .bar-fill { width: 20%; animation: growBar 0.8s ease-out 2.6s forwards; }
        .col--generic .metric:nth-child(3) .bar-fill { width: 15%; animation: growBar 0.8s ease-out 2.8s forwards; }
        .col--generic .metric:nth-child(4) .bar-fill { width: 25%; animation: growBar 0.8s ease-out 3.0s forwards; }

        @keyframes growBar {
            from { transform: scaleX(0); }
            to   { transform: scaleX(1); }
        }

        /* Approach chip */
        .approach {
            font-size: 0.7rem;
            padding: 0.4em 1em;
            border-radius: 100px;
            font-weight: 700;
            letter-spacing: 0.5px;
            opacity: 0;
        }

        .col--core .approach {
            background: rgba(6,182,212,0.1);
            border: 1px solid rgba(6,182,212,0.25);
            color: var(--cyan-400);
            animation: fadeIn 0.5s ease-out 2.0s forwards;
        }

        .col--supporting .approach {
            background: rgba(148,163,184,0.08);
            border: 1px solid rgba(148,163,184,0.2);
            color: #94a3b8;
            animation: fadeIn 0.5s ease-out 2.6s forwards;
        }

        .col--generic .approach {
            background: rgba(100,116,139,0.08);
            border: 1px solid rgba(100,116,139,0.15);
            color: #64748b;
            animation: fadeIn 0.5s ease-out 3.2s forwards;
        }

        /* === Animations === */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

        <div class="corner corner--tl"></div>
        <div class="corner corner--br"></div>

        <div class="content">
            <h2 class="section-title">Klasyfikacja = decyzja o <span class="highlight">alokacji zasobów</span></h2>

            <div class="columns">
                <!-- Core -->
                <div class="col col--core">
                    <span class="col-header"><i class="ti ti-crown"></i> Core</span>

                    <div class="metric">
                        <span class="metric-label"><span class="icon"><i class="ti ti-brain"></i></span> Ludzie</span>
                        <div class="bar-track"><div class="bar-fill">Seniorzy, experci</div></div>
                    </div>

                    <div class="metric">
                        <span class="metric-label"><span class="icon"><i class="ti ti-hourglass"></i></span> Czas</span>
                        <div class="bar-track"><div class="bar-fill">Maksimum</div></div>
                    </div>

                    <div class="metric">
                        <span class="metric-label"><span class="icon"><i class="ti ti-crane"></i></span> Głębia</span>
                        <div class="bar-track"><div class="bar-fill">Pełne DDD</div></div>
                    </div>

                    <span class="approach">Taktyczne DDD</span>
                </div>

                <!-- Supporting -->
                <div class="col col--supporting">
                    <span class="col-header"><i class="ti ti-building-columns"></i> Supporting</span>

                    <div class="metric">
                        <span class="metric-label"><span class="icon"><i class="ti ti-brain"></i></span> Ludzie</span>
                        <div class="bar-track"><div class="bar-fill">Midzi</div></div>
                    </div>

                    <div class="metric">
                        <span class="metric-label"><span class="icon"><i class="ti ti-hourglass"></i></span> Czas</span>
                        <div class="bar-track"><div class="bar-fill">Umiarkowanie</div></div>
                    </div>

                    <div class="metric">
                        <span class="metric-label"><span class="icon"><i class="ti ti-crane"></i></span> Głębia</span>
                        <div class="bar-track"><div class="bar-fill">Solidny kod</div></div>
                    </div>

                    <span class="approach">Solidna inżynieria</span>
                </div>

                <!-- Generic -->
                <div class="col col--generic">
                    <span class="col-header"><i class="ti ti-package"></i> Generic</span>

                    <div class="metric">
                        <span class="metric-label"><span class="icon"><i class="ti ti-brain"></i></span> Ludzie</span>
                        <div class="bar-track"><div class="bar-fill">Min</div></div>
                    </div>

                    <div class="metric">
                        <span class="metric-label"><span class="icon"><i class="ti ti-hourglass"></i></span> Czas</span>
                        <div class="bar-track"><div class="bar-fill">Min</div></div>
                    </div>

                    <div class="metric">
                        <span class="metric-label"><span class="icon"><i class="ti ti-crane"></i></span> Głębia</span>
                        <div class="bar-track"><div class="bar-fill">API</div></div>
                    </div>

                    <span class="approach">Kup gotowe</span>
                </div>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
