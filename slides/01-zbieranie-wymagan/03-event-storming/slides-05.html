<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 05 - Trzy poziomy Event Stormingu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 1400px;
            margin-top: -40px;
        }

        .section-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        .title-row {
            display: flex;
            align-items: center;
            gap: 28px;
            margin-bottom: 72px;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
        }

        .es-logo {
            height: 100px;
            width: auto;
            flex-shrink: 0;
            filter: drop-shadow(0 0 20px rgba(6, 182, 212, 0.3));
        }

        h2.title {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 0;
            color: #ffffff;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        .levels {
            display: flex;
            align-items: flex-end;
            gap: 0;
        }

        .level-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            border-radius: 20px;
            width: 280px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            opacity: 0;
        }

        .level-card:nth-child(1) {
            height: 280px;
            background: rgba(34, 211, 238, 0.06);
            animation: fadeUp 0.8s ease-out 0.4s forwards;
        }
        .level-card:nth-child(3) {
            height: 340px;
            background: rgba(34, 211, 238, 0.1);
            animation: fadeUp 0.8s ease-out 0.7s forwards;
        }
        .level-card:nth-child(5) {
            height: 400px;
            background: rgba(34, 211, 238, 0.16);
            animation: fadeUp 0.8s ease-out 1.0s forwards;
        }

        .level-card i {
            font-size: 44px;
            color: var(--cyan-400);
        }

        .level-card .level-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
        }

        .level-card .level-sub {
            font-size: 17px;
            color: var(--text-muted);
        }

        .arrow-sep {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            font-size: 32px;
            color: var(--cyan-400);
            opacity: 0;
        }

        .arrow-sep:nth-child(2) { animation: fadeIn 0.6s ease-out 0.6s forwards; }
        .arrow-sep:nth-child(4) { animation: fadeIn 0.6s ease-out 0.9s forwards; }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 500px; height: 500px; top: 5%; left: 5%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 10%; right: 15%;"></div>

        <div class="content">
            <span class="section-label">Poziomy</span>
            <div class="title-row">
                <h2 class="title">Poziomy <span class="highlight"></span></h2>
                <img src="images/event_sotrming_logo-trans.png" alt="EventStorming" class="es-logo">
            </div>

            <div class="levels">
                <div class="level-card">
                    <i class="ti ti-eye"></i>
                    <span class="level-title">Big Picture</span>
                    <span class="level-sub">Widok ogólny</span>
                </div>
                <div class="arrow-sep"><i class="ti ti-chevron-right"></i></div>
                <div class="level-card">
                    <i class="ti ti-git-branch"></i>
                    <span class="level-title">Process Level</span>
                    <span class="level-sub">Szczegóły procesu</span>
                </div>
                <div class="arrow-sep"><i class="ti ti-chevron-right"></i></div>
                <div class="level-card">
                    <i class="ti ti-code"></i>
                    <span class="level-title">Software Design</span>
                    <span class="level-sub">Architektura</span>
                </div>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
