<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 09 - Od ogółu do szczegółu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 1500px;
        }

        .section-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        h2.title {
            font-size: 60px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 80px;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        .pipeline {
            display: flex;
            align-items: center;
            gap: 0;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.5s forwards;
        }

        .step-card {
            width: 320px;
            padding: 48px 36px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            transition: transform 0.3s;
        }

        .step-card .step-number {
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .step-card .step-title {
            font-size: 24px;
            font-weight: 700;
        }

        .step-1 {
            background: rgba(6, 182, 212, 0.04);
            border: 1px solid rgba(6, 182, 212, 0.12);
        }
        .step-1 .step-number { color: rgba(6, 182, 212, 0.4); }
        .step-1 .step-title { color: rgba(248, 250, 252, 0.6); }
        .step-1 .step-icon { color: rgba(6, 182, 212, 0.3); font-size: 48px; }

        .step-2 {
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.25);
        }
        .step-2 .step-number { color: rgba(6, 182, 212, 0.6); }
        .step-2 .step-title { color: rgba(248, 250, 252, 0.8); }
        .step-2 .step-icon { color: rgba(6, 182, 212, 0.5); font-size: 48px; }

        .step-3 {
            background: rgba(6, 182, 212, 0.15);
            border: 2px solid rgba(6, 182, 212, 0.5);
            box-shadow: 0 0 40px rgba(6, 182, 212, 0.15);
        }
        .step-3 .step-number { color: var(--cyan-400); }
        .step-3 .step-title { color: #ffffff; }
        .step-3 .step-icon { color: var(--cyan-400); font-size: 48px; }

        .arrow {
            font-size: 40px;
            color: rgba(6, 182, 212, 0.3);
            margin: 0 24px;
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 500px; height: 500px; top: 8%; left: 8%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 12%; right: 10%;"></div>

        <div class="content">
            <span class="section-label">Progresja</span>
            <h2 class="title">Od ogółu do <span class="highlight">szczegółu</span></h2>

            <div class="pipeline">
                <div class="step-card step-1">
                    <span class="step-icon"><i class="ti ti-building"></i></span>
                    <span class="step-number">Krok 1</span>
                    <span class="step-title">Zrozumienie biznesu</span>
                </div>

                <span class="arrow"><i class="ti ti-arrow-right"></i></span>

                <div class="step-card step-2">
                    <span class="step-icon"><i class="ti ti-chart-dots-3"></i></span>
                    <span class="step-number">Krok 2</span>
                    <span class="step-title">Modelowanie procesu</span>
                </div>

                <span class="arrow"><i class="ti ti-arrow-right"></i></span>

                <div class="step-card step-3">
                    <span class="step-icon"><i class="ti ti-cpu"></i></span>
                    <span class="step-number">Krok 3</span>
                    <span class="step-title">Projektowanie systemu</span>
                </div>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
