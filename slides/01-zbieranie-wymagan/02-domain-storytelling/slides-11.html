<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 11 - Excel jako sygnał ostrzegawczy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --warning: #facc15;
            --warning-dim: rgba(250, 204, 21, 0.15);
            --warning-border: rgba(250, 204, 21, 0.3);
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(250, 204, 21, 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 1500px;
            margin-top: -40px;
        }

        .section-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--warning);
            margin-bottom: 24px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        h2.title {
            font-size: 60px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 72px;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--warning);
            text-shadow: 0 0 30px rgba(250, 204, 21, 0.4);
        }

        .cards {
            display: flex;
            gap: 48px;
            justify-content: center;
            margin-bottom: 56px;
        }

        .card {
            width: 520px;
            padding: 52px 40px;
            background: rgba(250, 204, 21, 0.04);
            border: 1px solid var(--warning-border);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 28px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .card:nth-child(1) { animation: fadeUp 0.7s ease-out 0.5s forwards; }
        .card:nth-child(2) { animation: fadeUp 0.7s ease-out 0.7s forwards; }

        .card:hover {
            border-color: var(--warning);
            transform: translateY(-8px);
            box-shadow: 0 8px 32px rgba(250, 204, 21, 0.12);
        }

        .card-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--warning-dim);
            border: 2px solid var(--warning-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: var(--warning);
        }

        .card-text {
            font-size: 24px;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.4;
        }

        .takeaway {
            padding: 28px 56px;
            background: rgba(250, 204, 21, 0.05);
            border: 2px solid var(--warning-border);
            border-radius: 16px;
            font-size: 30px;
            color: var(--text-main);
            font-weight: 600;
            opacity: 0;
            animation: fadeUp 0.7s ease-out 1.0s forwards;
        }

        .takeaway strong {
            color: var(--warning);
        }

        .accent {
            position: absolute;
            background: var(--warning);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.08;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 500px; height: 500px; top: 5%; left: 5%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 10%; right: 15%;"></div>

        <div class="content">
            <span class="section-label">Sygnał</span>
            <h2 class="title">„Eksportuję do <span class="highlight">Excela</span>..."</h2>

            <div class="cards">
                <div class="card">
                    <div class="card-icon"><i class="ti ti-alert-triangle"></i></div>
                    <span class="card-text">To nie jest proces biznesowy — to workaround</span>
                </div>
                <div class="card">
                    <div class="card-icon"><i class="ti ti-alert-circle"></i></div>
                    <span class="card-text">Dla kogoś kto robi to od 5 lat — „tak to działa"</span>
                </div>
            </div>

            <div class="takeaway">Workaround ≠ wymaganie <strong>biznesowe</strong></div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
