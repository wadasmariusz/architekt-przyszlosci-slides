<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 04 - Czas teraźniejszy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 1500px;
        }

        .section-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        h1.title {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 72px;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h1.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        .columns {
            display: flex;
            gap: 64px;
            align-items: flex-start;
            margin-bottom: 60px;
        }

        .column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            width: 440px;
            opacity: 0;
            animation: fadeUp 0.8s ease-out forwards;
        }

        .column.left { animation-delay: 0.5s; }
        .column.right { animation-delay: 0.7s; }

        .col-header {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .col-header.muted { color: var(--text-muted); }
        .col-header.cyan { color: var(--cyan-400); }

        .col-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 24px 32px;
            border-radius: 14px;
            width: 100%;
        }

        .col-card.muted-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .col-card.cyan-card {
            background: rgba(6, 182, 212, 0.07);
            border: 1px solid rgba(6, 182, 212, 0.2);
        }

        .col-card .card-icon {
            font-size: 32px;
            min-width: 40px;
            text-align: center;
        }

        .col-card.muted-card .card-icon { color: var(--text-muted); }
        .col-card.cyan-card .card-icon { color: var(--cyan-400); }

        .col-card .card-label {
            font-size: 22px;
            font-weight: 500;
            text-align: left;
        }

        .col-card.muted-card .card-label { color: var(--text-muted); }
        .col-card.cyan-card .card-label { color: var(--text-main); }

        .divider {
            width: 2px;
            height: 280px;
            background: linear-gradient(to bottom, transparent, rgba(6, 182, 212, 0.3), transparent);
            opacity: 0;
            animation: fadeIn 1s ease-out 0.6s forwards;
        }

        .takeaway {
            background: rgba(6, 182, 212, 0.06);
            border: 1px solid rgba(6, 182, 212, 0.25);
            border-radius: 16px;
            padding: 28px 48px;
            font-size: 24px;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeUp 0.8s ease-out 1.1s forwards;
        }

        .takeaway strong {
            color: var(--cyan-400);
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 500px; height: 500px; top: 8%; left: 8%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 12%; right: 10%;"></div>

        <div class="content">
            <span class="section-label">Narracja</span>

            <h1 class="title">Ekspert zaczyna <span class="highlight">opowiadać</span></h1>

            <div class="columns">
                <div class="column left">
                    <span class="col-header muted">Czas przyszły</span>
                    <div class="col-card muted-card">
                        <span class="card-icon"><i class="ti ti-clock"></i></span>
                        <span class="card-label">System powinien umożliwiać...</span>
                    </div>
                    <div class="col-card muted-card">
                        <span class="card-icon"><i class="ti ti-user"></i></span>
                        <span class="card-label">Użytownik bedzie mogł...</span>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="column right">
                    <span class="col-header cyan">Czas teraźniejszy</span>
                    <div class="col-card cyan-card">
                        <span class="card-icon"><i class="ti ti-writing"></i></span>
                        <span class="card-label">Klient wypełnia formularz</span>
                    </div>
                    <div class="col-card cyan-card">
                        <span class="card-icon"><i class="ti ti-ticket"></i></span>
                        <span class="card-label">Kasjer pobiera plan sali</span>
                    </div>
                </div>
            </div>

            <div class="takeaway">Mniej spekulacji, więcej <strong>konkretu</strong></div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
