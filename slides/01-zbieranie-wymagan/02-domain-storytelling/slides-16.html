<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 16 - Ewolucja diagramów</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 1500px;
            margin-top: -40px;
        }

        .section-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        h2.title {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 80px;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        .pipeline {
            display: flex;
            align-items: center;
            gap: 0;
            justify-content: center;
        }

        .step {
            width: 260px;
            padding: 44px 28px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 16px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .step:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 32px rgba(6, 182, 212, 0.15);
        }

        .step:nth-child(1) {
            border-color: rgba(148, 163, 184, 0.15);
            animation: fadeUp 0.7s ease-out 0.4s forwards;
        }
        .step:nth-child(3) {
            border-color: rgba(6, 182, 212, 0.15);
            animation: fadeUp 0.7s ease-out 0.6s forwards;
        }
        .step:nth-child(5) {
            border-color: rgba(6, 182, 212, 0.25);
            animation: fadeUp 0.7s ease-out 0.8s forwards;
        }
        .step:nth-child(7) {
            border-color: rgba(6, 182, 212, 0.4);
            background: rgba(6, 182, 212, 0.08);
            animation: fadeUp 0.7s ease-out 1.0s forwards;
        }

        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
        }

        .step:nth-child(1) .step-number {
            background: rgba(148, 163, 184, 0.15);
            color: var(--text-muted);
        }
        .step:nth-child(3) .step-number {
            background: rgba(6, 182, 212, 0.1);
            color: rgba(6, 182, 212, 0.6);
        }
        .step:nth-child(5) .step-number {
            background: rgba(6, 182, 212, 0.15);
            color: rgba(6, 182, 212, 0.8);
        }
        .step:nth-child(7) .step-number {
            background: rgba(6, 182, 212, 0.25);
            color: var(--cyan-400);
        }

        .step-label {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.3;
        }

        .step:nth-child(1) .step-label { color: var(--text-muted); }
        .step:nth-child(3) .step-label { color: rgba(248, 250, 252, 0.7); }
        .step:nth-child(5) .step-label { color: rgba(248, 250, 252, 0.85); }
        .step:nth-child(7) .step-label { color: var(--cyan-400); }

        .arrow {
            font-size: 36px;
            color: rgba(148, 163, 184, 0.3);
            margin: 0 12px;
            opacity: 0;
            animation: fadeIn 0.5s ease-out 0.9s forwards;
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 450px; height: 450px; top: 5%; right: 5%;"></div>
        <div class="accent" style="width: 350px; height: 350px; bottom: 10%; left: 10%;"></div>

        <div class="content">
            <span class="section-label">Ewolucja</span>
            <h2 class="title">Od zrozumienia do <span class="highlight">projektu</span></h2>

            <div class="pipeline">
                <div class="step">
                    <div class="step-number">1</div>
                    <span class="step-label">Czysty biznes</span>
                </div>
                <span class="arrow">&rarr;</span>
                <div class="step">
                    <div class="step-number">2</div>
                    <span class="step-label">Wi&eogon;cej szczeg&oacute;&lstrok;&oacute;w</span>
                </div>
                <span class="arrow">&rarr;</span>
                <div class="step">
                    <div class="step-number">3</div>
                    <span class="step-label">Dodanie technologii</span>
                </div>
                <span class="arrow">&rarr;</span>
                <div class="step">
                    <div class="step-number">4</div>
                    <span class="step-label">Projekt rozwi&aogon;zania</span>
                </div>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
