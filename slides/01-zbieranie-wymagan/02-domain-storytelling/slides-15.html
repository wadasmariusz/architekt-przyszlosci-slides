<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 15 - Podsumowanie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 1500px;
        }

        h2.title {
            font-size: 60px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 56px;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        .cards {
            display: flex;
            gap: 32px;
            margin-bottom: 40px;
        }

        .card {
            width: 280px;
            padding: 40px 24px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 20px;
            opacity: 0;
        }

        .card:nth-child(1) { animation: fadeUp 0.7s ease-out 0.3s forwards; }
        .card:nth-child(2) { animation: fadeUp 0.7s ease-out 0.45s forwards; }
        .card:nth-child(3) { animation: fadeUp 0.7s ease-out 0.6s forwards; }
        .card:nth-child(4) { animation: fadeUp 0.7s ease-out 0.75s forwards; }

        .card-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(6, 182, 212, 0.1);
            border: 2px solid rgba(6, 182, 212, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--cyan-400);
        }

        .card-text {
            font-size: 22px;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.3;
        }

        .tool-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.25);
            border-radius: 999px;
            font-size: 20px;
            color: var(--cyan-400);
            font-weight: 600;
            margin-bottom: 32px;
            opacity: 0;
            animation: fadeUp 0.7s ease-out 0.9s forwards;
        }

        .tool-badge .tool-desc {
            color: var(--text-muted);
            font-weight: 400;
        }

        .cta-box {
            padding: 24px 56px;
            background: rgba(6, 182, 212, 0.08);
            border: 2px solid rgba(6, 182, 212, 0.25);
            border-radius: 16px;
            font-size: 26px;
            color: var(--text-main);
            font-weight: 500;
            opacity: 0;
            animation: fadeUp 0.7s ease-out 1.05s forwards;
        }

        .cta-box strong {
            color: var(--cyan-400);
            font-weight: 700;
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 450px; height: 450px; top: 5%; left: 10%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 10%; right: 5%;"></div>

        <div class="content">
            <h2 class="title">Najważniejsze <span class="highlight">wnioski</span></h2>

            <div class="cards">
                <div class="card">
                    <div class="card-icon"><i class="ti ti-ear"></i></div>
                    <span class="card-text">Słuchaj i rysuj</span>
                </div>
                <div class="card">
                    <div class="card-icon"><i class="ti ti-route"></i></div>
                    <span class="card-text">Happy Path najpierw</span>
                </div>
                <div class="card">
                    <div class="card-icon"><i class="ti ti-separator"></i></div>
                    <span class="card-text">Czysty biznes bez technologii</span>
                </div>
                <div class="card">
                    <div class="card-icon"><i class="ti ti-message-circle"></i></div>
                    <span class="card-text">Rozmowa jest kluczowa</span>
                </div>
            </div>

            <div class="tool-badge">
                <i class="ti ti-tool"></i>
                Egon.io <span class="tool-desc">— bezpłatne narzędzie od autorów</span>
            </div>

            <div class="cta-box">Najwięcej odkrywasz, gdy ekspert zaczyna <strong>opowiadać</strong></div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
