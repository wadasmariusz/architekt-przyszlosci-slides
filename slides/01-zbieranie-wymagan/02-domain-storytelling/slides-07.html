<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 07 - Aktywność</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 1500px;
        }

        .section-label {
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.2s forwards;
        }

        h1.title {
            font-size: 72px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 70px;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.4s forwards;
            letter-spacing: -1px;
        }

        h1.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        .actions-row {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 60px;
        }

        .action-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px 48px;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            opacity: 0;
            animation: fadeUp 0.8s ease-out forwards;
        }

        .action-card:nth-child(1) { animation-delay: 0.6s; }
        .action-card:nth-child(3) { animation-delay: 0.8s; }
        .action-card:nth-child(5) { animation-delay: 1.0s; }

        .action-card .icon {
            font-size: 44px;
            color: var(--cyan-400);
        }

        .action-card .label {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-main);
        }

        .flow-arrow {
            font-size: 32px;
            color: var(--cyan-400);
            opacity: 0;
            animation: fadeIn 0.6s ease-out forwards;
        }

        .flow-arrow:nth-child(2) { animation-delay: 0.7s; }
        .flow-arrow:nth-child(4) { animation-delay: 0.9s; }

        .takeaway {
            background: rgba(6, 182, 212, 0.06);
            border: 1px solid rgba(6, 182, 212, 0.25);
            border-radius: 16px;
            padding: 28px 48px;
            font-size: 24px;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeUp 0.8s ease-out 1.3s forwards;
        }

        .takeaway strong {
            color: var(--cyan-400);
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 500px; height: 500px; top: 5%; left: 5%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 10%; right: 15%;"></div>

        <div class="content">
            <div class="section-label">Element</div>

            <h1 class="title"><span class="highlight">Aktywność</span></h1>

            <div class="actions-row">
                <div class="action-card">
                    <div class="icon"><i class="ti ti-send"></i></div>
                    <div class="label">Wysyła</div>
                </div>
                <span class="flow-arrow"><i class="ti ti-arrow-right"></i></span>
                <div class="action-card">
                    <div class="icon"><i class="ti ti-check"></i></div>
                    <div class="label">Waliduje</div>
                </div>
                <span class="flow-arrow"><i class="ti ti-arrow-right"></i></span>
                <div class="action-card">
                    <div class="icon"><i class="ti ti-thumb-up"></i></div>
                    <div class="label">Zatwierdza</div>
                </div>
            </div>

            <div class="takeaway">Strzałki budują historię <strong>krok po kroku</strong></div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
