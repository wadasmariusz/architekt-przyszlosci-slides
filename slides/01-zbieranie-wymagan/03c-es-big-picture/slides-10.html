<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 10 - Porządkowanie (Faza 2)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 1400px;
            margin-top: -40px;
        }

        .section-label {
            font-size: 16px;
            font-weight: 700;
            color: var(--cyan-400);
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.1s forwards;
        }

        h2.title {
            font-size: 64px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 80px;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        .timeline {
            position: relative;
            width: 1100px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.5s forwards;
        }

        .timeline-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, var(--cyan-500), var(--cyan-400));
            border-radius: 2px;
            transform: translateY(-50%);
        }

        .timeline-arrow {
            position: absolute;
            top: 50%;
            right: -16px;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-left: 20px solid var(--cyan-400);
        }

        .timeline-markers {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 60px;
        }

        .marker {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .marker-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--cyan-400);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.6);
            border: 3px solid #030712;
        }

        .marker-label {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 500px; height: 500px; top: 5%; left: 5%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 10%; right: 15%;"></div>

        <div class="content">
            <p class="section-label">Faza 2</p>
            <h2 class="title"><span class="highlight">Porządkowanie</span></h2>

            <div class="timeline">
                <div class="timeline-line"></div>
                <div class="timeline-arrow"></div>
                <div class="timeline-markers">
                    <div class="marker">
                        <div class="marker-dot"></div>
                        <span class="marker-label">Oś czasu</span>
                    </div>
                    <div class="marker">
                        <div class="marker-dot"></div>
                        <span class="marker-label">Od lewej do prawej</span>
                    </div>
                    <div class="marker">
                        <div class="marker-dot"></div>
                        <span class="marker-label">Logiczna kolejność</span>
                    </div>
                </div>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
