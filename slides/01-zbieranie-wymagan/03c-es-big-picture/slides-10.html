<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 10 - Porządkowanie (Faza 2)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .section-label {
            font-size: 16px;
            font-weight: 700;
            color: var(--cyan-400);
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.1s forwards;
        }

        h2.title {
            font-size: 64px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 40px;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        .board-svg {
            opacity: 0;
            animation: fadeUp 1s ease-out 0.5s forwards;
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 500px; height: 500px; top: 5%; left: 5%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 10%; right: 15%;"></div>

        <div class="content">
            <p class="section-label">Faza 2</p>
            <h2 class="title"><span class="highlight">Porządkowanie</span></h2>

            <!--
                SVG BOARD: viewBox="0 0 1300 500"
                Każda karteczka to <g transform="translate(X, Y) rotate(R)">
                X: 0–1160   Y: 0–360   (karteczka 140x90, board 1300x500)
                Oś czasu na dole (y=460)
            -->
            <svg class="board-svg" width="1300" height="500" viewBox="0 0 1300 500" xmlns="http://www.w3.org/2000/svg">
                <!-- biała tablica -->
                <rect x="0" y="0" width="1300" height="500" rx="8" fill="#f5f0e8" />

                <!-- oś czasu -->
                <line x1="60" y1="465" x2="1220" y2="465" stroke="rgba(0,0,0,0.15)" stroke-width="4" stroke-linecap="round"/>
                <polygon points="1230,465 1216,457 1216,473" fill="rgba(0,0,0,0.15)"/>
                <text x="60" y="455" fill="rgba(0,0,0,0.3)" font-size="14" font-weight="600" letter-spacing="2">START</text>
                <text x="1170" y="455" fill="rgba(0,0,0,0.3)" font-size="14" font-weight="600" letter-spacing="2">KONIEC</text>

                <!-- KARTECZKI: zmień translate(X,Y) żeby przesuwać, rotate(R) żeby obracać -->

                <g transform="translate(20, 30) rotate(-3)">
                    <rect width="140" height="90" rx="3" fill="#ff9800" filter="drop-shadow(3px 3px 4px rgba(0,0,0,0.25))"/>
                    <text x="70" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a"><tspan x="70" dy="0">Klient składa</tspan><tspan x="70" dy="16">zamówienie</tspan></text>
                </g>

                <g transform="translate(110, 150) rotate(2)">
                    <rect width="140" height="90" rx="3" fill="#ff9800" filter="drop-shadow(3px 3px 4px rgba(0,0,0,0.25))"/>
                    <text x="70" y="45" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Produkt wybrany</text>
                </g>

                <g transform="translate(200, 50) rotate(-1)">
                    <rect width="140" height="90" rx="3" fill="#ff9800" filter="drop-shadow(3px 3px 4px rgba(0,0,0,0.25))"/>
                    <text x="70" y="45" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Koszyk utworzony</text>
                </g>

                <g transform="translate(300, 170) rotate(3)">
                    <rect width="140" height="90" rx="3" fill="#ff9800" filter="drop-shadow(3px 3px 4px rgba(0,0,0,0.25))"/>
                    <text x="70" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a"><tspan x="70" dy="0">Płatność</tspan><tspan x="70" dy="16">zatwierdzona</tspan></text>
                </g>

                <g transform="translate(400, 60) rotate(-2)">
                    <rect width="140" height="90" rx="3" fill="#ff9800" filter="drop-shadow(3px 3px 4px rgba(0,0,0,0.25))"/>
                    <text x="70" y="45" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Adres podany</text>
                </g>

                <g transform="translate(490, 200) rotate(1.5)">
                    <rect width="140" height="90" rx="3" fill="#ff9800" filter="drop-shadow(3px 3px 4px rgba(0,0,0,0.25))"/>
                    <text x="70" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a"><tspan x="70" dy="0">Zamówienie</tspan><tspan x="70" dy="16">przyjęte</tspan></text>
                </g>

                <g transform="translate(580, 40) rotate(-2.5)">
                    <rect width="140" height="90" rx="3" fill="#ff9800" filter="drop-shadow(3px 3px 4px rgba(0,0,0,0.25))"/>
                    <text x="70" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a"><tspan x="70" dy="0">Faktura</tspan><tspan x="70" dy="16">wystawiona</tspan></text>
                </g>

                <g transform="translate(680, 160) rotate(2)">
                    <rect width="140" height="90" rx="3" fill="#ff9800" filter="drop-shadow(3px 3px 4px rgba(0,0,0,0.25))"/>
                    <text x="70" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a"><tspan x="70" dy="0">Produkt</tspan><tspan x="70" dy="16">spakowany</tspan></text>
                </g>

                <g transform="translate(780, 50) rotate(-1.5)">
                    <rect width="140" height="90" rx="3" fill="#ff9800" filter="drop-shadow(3px 3px 4px rgba(0,0,0,0.25))"/>
                    <text x="70" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a"><tspan x="70" dy="0">Kurier</tspan><tspan x="70" dy="16">przypisany</tspan></text>
                </g>

                <g transform="translate(870, 190) rotate(1)">
                    <rect width="140" height="90" rx="3" fill="#ff9800" filter="drop-shadow(3px 3px 4px rgba(0,0,0,0.25))"/>
                    <text x="70" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a"><tspan x="70" dy="0">Przesyłka</tspan><tspan x="70" dy="16">wysłana</tspan></text>
                </g>

                <g transform="translate(960, 70) rotate(-2)">
                    <rect width="140" height="90" rx="3" fill="#ff9800" filter="drop-shadow(3px 3px 4px rgba(0,0,0,0.25))"/>
                    <text x="70" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a"><tspan x="70" dy="0">Klient</tspan><tspan x="70" dy="16">powiadomiony</tspan></text>
                </g>

                <g transform="translate(1050, 180) rotate(3)">
                    <rect width="140" height="90" rx="3" fill="#ff9800" filter="drop-shadow(3px 3px 4px rgba(0,0,0,0.25))"/>
                    <text x="70" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a"><tspan x="70" dy="0">Przesyłka</tspan><tspan x="70" dy="16">dostarczona</tspan></text>
                </g>

                <g transform="translate(1140, 60) rotate(-1)">
                    <rect width="140" height="90" rx="3" fill="#ff9800" filter="drop-shadow(3px 3px 4px rgba(0,0,0,0.25))"/>
                    <text x="70" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a"><tspan x="70" dy="0">Opinia</tspan><tspan x="70" dy="16">wystawiona</tspan></text>
                </g>
            </svg>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
