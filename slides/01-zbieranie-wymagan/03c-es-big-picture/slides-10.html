<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 10 - Porządkowanie (Faza 2)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 1400px;
            margin-top: -40px;
        }

        .section-label {
            font-size: 16px;
            font-weight: 700;
            color: var(--cyan-400);
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.1s forwards;
        }

        h2.title {
            font-size: 64px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 80px;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        .board {
            position: relative;
            width: 1300px;
            height: 480px;
            background: #f5f0e8;
            border-radius: 8px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            opacity: 0;
            animation: fadeUp 1s ease-out 0.5s forwards;
            overflow: hidden;
        }

        .board-arrow {
            position: absolute;
            bottom: 24px;
            left: 60px;
            right: 60px;
            height: 4px;
            background: rgba(0,0,0,0.15);
            border-radius: 2px;
        }

        .board-arrow::after {
            content: '';
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-left: 14px solid rgba(0,0,0,0.15);
        }

        .board-label-start,
        .board-label-end {
            position: absolute;
            bottom: 36px;
            font-size: 14px;
            font-weight: 600;
            color: rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .board-label-start { left: 60px; }
        .board-label-end { right: 60px; }

        .stickies {
            position: absolute;
            inset: 0;
        }

        .sticky {
            position: absolute;
            width: 140px;
            height: 90px;
            background: #ff9800;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px;
            font-size: 13px;
            font-weight: 700;
            color: #1a1a1a;
            box-shadow: 3px 3px 8px rgba(0,0,0,0.25);
            line-height: 1.2;
            box-sizing: border-box;
            opacity: 0;
        }

        /* animacja pojawienia się karteczek */
        .sticky { animation: stickyIn 0.5s ease-out forwards; }

        @keyframes stickyIn {
            from { opacity: 0; transform: translateY(-15px) rotate(0deg); }
            to { opacity: 1; }
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 500px; height: 500px; top: 5%; left: 5%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 10%; right: 15%;"></div>

        <div class="content">
            <p class="section-label">Faza 2</p>
            <h2 class="title"><span class="highlight">Porządkowanie</span></h2>

            <div class="board">
                <div class="board-arrow"></div>
                <div class="board-label-start">Start</div>
                <div class="board-label-end">Koniec</div>

                <div class="stickies">
                    <!-- BOARD: 1300 x 480px. Karteczka: 140 x 90px.
                         x (left): 0 – 1160    y (top): 0 – 330
                         Zmień left/top żeby przesuwać karteczkę -->
                    <div class="sticky" style="left:10px;  top:80px;  transform:rotate(-4deg);  animation-delay:0.7s">Klient składa zamówienie</div>
                    <div class="sticky" style="left:100px; top:140px; transform:rotate(2deg);   animation-delay:0.8s">Produkt wybrany</div>
                    <div class="sticky" style="left:200px; top:60px;  transform:rotate(-1deg);  animation-delay:0.9s">Koszyk utworzony</div>
                    <div class="sticky" style="left:300px; top:160px; transform:rotate(3deg);   animation-delay:1.0s">Płatność zatwierdzona</div>
                    <div class="sticky" style="left:390px; top:50px;  transform:rotate(-2deg);  animation-delay:1.1s">Adres podany</div>
                    <div class="sticky" style="left:180px; top:50px; transform:rotate(1.5deg); animation-delay:1.2s">Zamówienie przyjęte</div>
                    <div class="sticky" style="left:570px; top:70px;  transform:rotate(-3deg);  animation-delay:1.3s">Faktura wystawiona</div>
                    <div class="sticky" style="left:660px; top:40px; transform:rotate(2.5deg); animation-delay:1.4s">Produkt spakowany</div>
                    <div class="sticky" style="left:750px; top:55px;  transform:rotate(-1.5deg);animation-delay:1.5s">Kurier przypisany</div>
                    <div class="sticky" style="left:840px; top:60px; transform:rotate(1deg);   animation-delay:1.6s">Przesyłka wysłana</div>
                    <div class="sticky" style="left:930px; top:65px;  transform:rotate(-2.5deg);animation-delay:1.7s">Klient powiadomiony</div>
                    <div class="sticky" style="left:1020px;top:45px; transform:rotate(3.5deg); animation-delay:1.8s">Przesyłka dostarczona</div>
                    <div class="sticky" style="left:1110px;top:70px;  transform:rotate(-1deg);  animation-delay:1.9s">Opinia wystawiona</div>
                </div>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
