<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 02 - Czym jest Big Picture Event Storming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 0 120px;
            width: 55%;
            box-sizing: border-box;
            align-self: flex-start;
        }

        .section-label {
            font-size: 18px;
            color: var(--cyan-400);
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: 600;
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.3s forwards;
        }

        h2.title {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 64px;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.5s forwards;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        .item {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 36px;
            opacity: 0;
        }

        .item:nth-child(1) { animation: fadeUp 0.8s ease-out 0.7s forwards; }
        .item:nth-child(2) { animation: fadeUp 0.8s ease-out 0.9s forwards; }
        .item:nth-child(3) { animation: fadeUp 0.8s ease-out 1.1s forwards; }

        .item .icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }

        .item.muted .icon {
            background: rgba(148, 163, 184, 0.1);
            color: var(--text-muted);
        }

        .item.muted .label {
            font-size: 32px;
            color: var(--text-muted);
            text-decoration: line-through;
            font-weight: 500;
        }

        .item.active .icon {
            background: rgba(6, 182, 212, 0.15);
            color: var(--cyan-400);
        }

        .item.active .label {
            font-size: 32px;
            color: var(--cyan-400);
            font-weight: 700;
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sticky-notes {
            position: absolute;
            right: 120px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 520px;
            z-index: 10;
            justify-content: center;
        }

        .sticky {
            width: 220px;
            height: 140px;
            background: #ff9800;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            box-shadow: 4px 4px 12px rgba(0,0,0,0.4);
            opacity: 0;
            box-sizing: border-box;
            line-height: 1.3;
        }

        .sticky:nth-child(1) { transform: rotate(-3deg); animation: stickyIn 0.6s ease-out 0.8s forwards; }
        .sticky:nth-child(2) { transform: rotate(2deg); animation: stickyIn 0.6s ease-out 1.0s forwards; }
        .sticky:nth-child(3) { transform: rotate(-1.5deg); animation: stickyIn 0.6s ease-out 1.2s forwards; }
        .sticky:nth-child(4) { transform: rotate(3deg); animation: stickyIn 0.6s ease-out 1.4s forwards; }
        .sticky:nth-child(5) { transform: rotate(-2deg); animation: stickyIn 0.6s ease-out 1.6s forwards; }

        @keyframes stickyIn {
            from { opacity: 0; transform: translateY(-20px) rotate(0deg); }
            to { opacity: 1; }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 500px; height: 500px; top: 5%; left: 5%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 10%; right: 15%;"></div>

        <div class="content">
            <div class="section-label">Czym jest Big Picture EventStorming</div>
            <h2 class="title">Budujemy <span class="highlight">wspólny obraz</span></h2>

            <div class="items">
                <div class="item active">
                    <div class="icon"><i class="ti ti-search"></i></div>
                    <span class="label">Warsztat odkrywania procesu</span>
                </div>
                <div class="item active">
                    <div class="icon"><i class="ti ti-map"></i></div>
                    <span class="label">Wspólne mapowanie zdarzeń</span>
                </div>
                <div class="item active">
                    <div class="icon"><i class="ti ti-bulb"></i></div>
                    <span class="label">Zrozumienie jak działa biznes</span>
                </div>
            </div>
        </div>

        <div class="sticky-notes">
            <div class="sticky">Zamówienie złożone</div>
            <div class="sticky">Płatność zatwierdzona</div>
            <div class="sticky">Produkt wysłany</div>
            <div class="sticky">Faktura wystawiona</div>
            <div class="sticky">Klient zarejestrowany</div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">kamera 480 &times; 270</div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
