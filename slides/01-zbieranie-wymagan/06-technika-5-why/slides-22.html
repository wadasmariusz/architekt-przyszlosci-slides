<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 22 - Alternatywa (Ishikawa)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1200px;
            height: 1200px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.12;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 1500px;
            margin-top: -20px;
        }

        .section-label {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--cyan-400);
            margin-bottom: 16px;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 0.2s forwards;
        }

        .slide-title {
            font-size: 52px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 50px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.4s forwards;
        }

        .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.4);
        }

        /* Ishikawa Diagram */
        .fishbone {
            position: relative;
            width: 1100px;
            height: 420px;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.7s forwards;
        }

        /* Spine */
        .spine {
            position: absolute;
            top: 50%;
            left: 80px;
            width: 860px;
            height: 4px;
            background: var(--cyan-400);
            transform: translateY(-50%);
            box-shadow: 0 0 12px rgba(6, 182, 212, 0.4);
        }

        .spine::after {
            content: '';
            position: absolute;
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            border-left: 24px solid var(--cyan-400);
            border-top: 14px solid transparent;
            border-bottom: 14px solid transparent;
            filter: drop-shadow(0 0 8px rgba(6, 182, 212, 0.4));
        }

        /* Problem box */
        .problem-box {
            position: absolute;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            background: rgba(6, 182, 212, 0.15);
            border: 2px solid var(--cyan-400);
            border-radius: 12px;
            padding: 16px 28px;
            font-size: 22px;
            font-weight: 700;
            color: var(--cyan-400);
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.2);
        }

        /* Branches */
        .branch {
            position: absolute;
            display: flex;
            align-items: center;
        }

        .branch-line {
            width: 100px;
            height: 3px;
            background: rgba(148, 163, 184, 0.4);
        }

        .branch-label {
            font-size: 16px;
            font-weight: 600;
            padding: 8px 16px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 8px;
            white-space: nowrap;
        }

        /* Top branches (going up-left) */
        .branch-top {
            transform-origin: right center;
        }
        .branch-top-1 {
            top: 80px;
            left: 100px;
            transform: rotate(30deg);
            transform-origin: bottom right;
        }
        .branch-top-2 {
            top: 80px;
            left: 340px;
            transform: rotate(30deg);
            transform-origin: bottom right;
        }
        .branch-top-3 {
            top: 80px;
            left: 580px;
            transform: rotate(30deg);
            transform-origin: bottom right;
        }

        /* Bottom branches (going down-left) */
        .branch-bottom-1 {
            bottom: 80px;
            left: 100px;
            transform: rotate(-30deg);
            transform-origin: top right;
        }
        .branch-bottom-2 {
            bottom: 80px;
            left: 340px;
            transform: rotate(-30deg);
            transform-origin: top right;
        }
        .branch-bottom-3 {
            bottom: 80px;
            left: 580px;
            transform: rotate(-30deg);
            transform-origin: top right;
        }

        .diagram-title {
            font-size: 20px;
            color: var(--text-muted);
            margin-top: 20px;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 1.2s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 600px; height: 600px; top: 5%; left: 10%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 10%; right: 20%;"></div>

        <div class="content">
            <div class="section-label">ALTERNATYWA</div>
            <h1 class="slide-title">Gdy problem jest złożony — <span class="highlight">myśl szerzej</span></h1>

            <div class="fishbone">
                <!-- Spine -->
                <div class="spine"></div>

                <!-- Problem box -->
                <div class="problem-box">Problem</div>

                <!-- Top branches -->
                <div class="branch branch-top-1">
                    <div class="branch-label">Ludzie</div>
                    <div class="branch-line"></div>
                </div>
                <div class="branch branch-top-2">
                    <div class="branch-label">Procesy</div>
                    <div class="branch-line"></div>
                </div>
                <div class="branch branch-top-3">
                    <div class="branch-label">Technologia</div>
                    <div class="branch-line"></div>
                </div>

                <!-- Bottom branches -->
                <div class="branch branch-bottom-1">
                    <div class="branch-label">Środowisko</div>
                    <div class="branch-line"></div>
                </div>
                <div class="branch branch-bottom-2">
                    <div class="branch-label">Materiały</div>
                    <div class="branch-line"></div>
                </div>
                <div class="branch branch-bottom-3">
                    <div class="branch-label">Metody</div>
                    <div class="branch-line"></div>
                </div>
            </div>

            <div class="diagram-title">Diagram Ishikawy</div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
