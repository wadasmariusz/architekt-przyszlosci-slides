<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 16 - Wniosek z przykładu 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            width: 1500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -40px;
        }

        .section-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        h2.title {
            font-size: 52px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 80px;
            text-align: center;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        .steps {
            display: flex;
            gap: 80px;
            align-items: flex-start;
        }

        .step-card {
            padding: 40px 48px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 480px;
            text-align: center;
        }

        .step-card.active {
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.3);
            box-shadow: 0 0 40px rgba(6, 182, 212, 0.1);
        }

        .step-card.muted {
            opacity: 0.45;
        }

        .step-number {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--cyan-400);
            font-weight: 600;
        }

        .step-card.muted .step-number {
            color: var(--text-muted);
        }

        .step-flow {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .step-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: var(--cyan-400);
        }

        .step-card.muted .step-icon {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
        }

        .step-arrow {
            font-size: 28px;
            color: var(--cyan-400);
        }

        .step-card.muted .step-arrow {
            color: var(--text-muted);
        }

        .step-label {
            font-size: 22px;
            font-weight: 600;
            color: #ffffff;
        }

        .step-card.muted .step-label {
            color: var(--text-muted);
        }

        .servers-row {
            display: flex;
            gap: 12px;
        }

        .step1 {
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.5s forwards;
        }

        .step2 {
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.8s forwards;
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 400px; height: 400px; top: 8%; left: 8%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 12%; right: 12%;"></div>

        <div class="content">
            <span class="section-label">Wniosek</span>
            <h2 class="title">Najpierw usuń ograniczenie, <span class="highlight">potem skaluj</span></h2>

            <div class="steps">
                <div class="step-card active step1">
                    <span class="step-number">Krok 1</span>
                    <div class="step-flow">
                        <div class="step-icon"><i class="ti ti-server"></i></div>
                        <div class="step-arrow"><i class="ti ti-arrow-right"></i></div>
                        <div class="step-icon"><i class="ti ti-database"></i></div>
                    </div>
                    <span class="step-label">Usuń ograniczenie</span>
                </div>

                <div class="step-card muted step2">
                    <span class="step-number">Krok 2</span>
                    <div class="step-flow">
                        <div class="servers-row">
                            <div class="step-icon"><i class="ti ti-server"></i></div>
                            <div class="step-icon"><i class="ti ti-server"></i></div>
                            <div class="step-icon"><i class="ti ti-server"></i></div>
                        </div>
                    </div>
                    <span class="step-label">Skaluj</span>
                </div>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
