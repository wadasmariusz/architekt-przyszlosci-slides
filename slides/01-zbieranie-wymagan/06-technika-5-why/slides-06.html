<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 06 - Technika 5 WHY - Wprowadzenie metody</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            width: 1500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -40px;
        }

        .era-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        h2.title {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 70px;
            text-align: center;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        .why-stack {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
            width: 700px;
        }

        .why-row {
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
        }

        .why-row:nth-child(1) { animation: fadeUp 0.6s ease-out 0.5s forwards; }
        .why-row:nth-child(2) { animation: fadeUp 0.6s ease-out 0.7s forwards; }
        .why-row:nth-child(3) { animation: fadeUp 0.6s ease-out 0.9s forwards; }
        .why-row:nth-child(4) { animation: fadeUp 0.6s ease-out 1.1s forwards; }
        .why-row:nth-child(5) { animation: fadeUp 0.6s ease-out 1.3s forwards; }

        .why-arrow {
            color: var(--text-muted);
            font-size: 18px;
            opacity: 0.5;
        }

        .why-label {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .why-row:nth-child(1) .why-label { font-size: 44px; color: rgba(248, 250, 252, 0.5); }
        .why-row:nth-child(2) .why-label { font-size: 38px; color: rgba(34, 211, 238, 0.4); }
        .why-row:nth-child(3) .why-label { font-size: 32px; color: rgba(34, 211, 238, 0.55); }
        .why-row:nth-child(4) .why-label { font-size: 28px; color: rgba(34, 211, 238, 0.7); }
        .why-row:nth-child(5) .why-label {
            font-size: 24px;
            color: var(--cyan-400);
            text-shadow: 0 0 20px rgba(6, 182, 212, 0.6);
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 400px; height: 400px; top: 10%; left: 8%;"></div>
        <div class="accent" style="width: 500px; height: 500px; bottom: 8%; right: 10%;"></div>

        <div class="content">
            <span class="era-label">Metoda</span>
            <h2 class="title">5 WHY = dojście do <span class="highlight">przyczyny</span>, nie objawu</h2>

            <div class="why-stack">
                <div class="why-row">
                    <span class="why-label">WHY?</span>
                </div>
                <div class="why-row" style="padding-left: 48px;">
                    <span class="why-arrow">&rarr;</span>
                    <span class="why-label">WHY?</span>
                </div>
                <div class="why-row" style="padding-left: 96px;">
                    <span class="why-arrow">&rarr; &rarr;</span>
                    <span class="why-label">WHY?</span>
                </div>
                <div class="why-row" style="padding-left: 144px;">
                    <span class="why-arrow">&rarr; &rarr; &rarr;</span>
                    <span class="why-label">WHY?</span>
                </div>
                <div class="why-row" style="padding-left: 192px;">
                    <span class="why-arrow">&rarr; &rarr; &rarr; &rarr;</span>
                    <span class="why-label">WHY?</span>
                </div>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
