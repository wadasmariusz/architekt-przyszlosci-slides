<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 12 - Sygnał właściwy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1200px;
            height: 1200px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.12;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 1400px;
            margin-top: -40px;
        }

        .section-label {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--cyan-400);
            margin-bottom: 16px;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 0.2s forwards;
        }

        .slide-title {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 56px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.4s forwards;
        }

        .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.4);
        }

        .biz-cards {
            display: flex;
            gap: 36px;
        }

        .biz-card {
            width: 340px;
            padding: 40px 32px;
            border-radius: 16px;
            background: rgba(34, 197, 94, 0.04);
            border: 1px solid rgba(34, 197, 94, 0.15);
            border-left: 4px solid #4ade80;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            opacity: 0;
        }

        .biz-card:nth-child(1) { animation: fadeUp 0.6s ease-out 0.7s forwards; }
        .biz-card:nth-child(2) { animation: fadeUp 0.6s ease-out 1.0s forwards; }
        .biz-card:nth-child(3) { animation: fadeUp 0.6s ease-out 1.3s forwards; }

        .biz-card .icon-wrap {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(6, 182, 212, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .biz-card .icon-wrap i {
            font-size: 36px;
            color: var(--cyan-400);
        }

        .biz-card .card-text {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 550px; height: 550px; top: 5%; left: 25%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 10%; right: 20%;"></div>

        <div class="content">
            <div class="section-label">WŁAŚCIWY SYGNAŁ</div>
            <h1 class="slide-title">Problem zaczyna się od <span class="highlight">biznesu</span></h1>

            <div class="biz-cards">
                <div class="biz-card">
                    <div class="icon-wrap">
                        <i class="ti ti-shopping-cart"></i>
                    </div>
                    <div class="card-text">Tracimy zamówienia</div>
                </div>

                <div class="biz-card">
                    <div class="icon-wrap">
                        <i class="ti ti-user-minus"></i>
                    </div>
                    <div class="card-text">Klienci odchodzą</div>
                </div>

                <div class="biz-card">
                    <div class="icon-wrap">
                        <i class="ti ti-clock"></i>
                    </div>
                    <div class="card-text">Proces trwa za długo</div>
                </div>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
