<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 21 - Pułapka #2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            width: 1500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -40px;
        }

        .section-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cyan-400);
            margin-bottom: 24px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        h2.title {
            font-size: 60px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 80px;
            text-align: center;
            color: #ffffff;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.2s forwards;
            letter-spacing: -1px;
        }

        h2.title .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        .diagrams {
            display: flex;
            gap: 120px;
            align-items: flex-start;
        }

        .diagram {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            opacity: 0;
        }

        .diagram.left { animation: fadeUp 0.8s ease-out 0.5s forwards; }
        .diagram.right { animation: fadeUp 0.8s ease-out 0.8s forwards; }

        .diagram-label {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .diagram.left .diagram-label { color: var(--text-muted); }
        .diagram.right .diagram-label { color: var(--cyan-400); }

        /* Linear diagram */
        .linear-chain {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .linear-node {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .linear-node .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .linear-line {
            width: 2px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Branching tree */
        .tree {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tree-node {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(6, 182, 212, 0.08);
            border: 2px solid rgba(6, 182, 212, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tree-node .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--cyan-400);
        }

        .tree-connector {
            width: 2px;
            height: 32px;
            background: rgba(6, 182, 212, 0.2);
        }

        .tree-row {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            position: relative;
        }

        .tree-branch {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tree-level-1 {
            display: flex;
            gap: 80px;
            position: relative;
        }

        .tree-level-1::before {
            content: '';
            position: absolute;
            top: 0;
            left: 24px;
            right: 24px;
            height: 2px;
            background: rgba(6, 182, 212, 0.2);
        }

        .tree-level-2 {
            display: flex;
            gap: 24px;
            position: relative;
        }

        .tree-level-2::before {
            content: '';
            position: absolute;
            top: 0;
            left: 24px;
            right: 24px;
            height: 2px;
            background: rgba(6, 182, 212, 0.15);
        }

        .tree-level-2 .tree-branch {
            gap: 0;
        }

        .tree-level-2 .tree-node {
            width: 36px;
            height: 36px;
        }

        .tree-level-2 .tree-node .dot {
            width: 8px;
            height: 8px;
        }

        .tree-level-2 .tree-connector {
            height: 24px;
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.12;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 400px; height: 400px; top: 10%; left: 10%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 15%; right: 10%;"></div>

        <div class="content">
            <span class="section-label">Złożoność</span>
            <h2 class="title">Problem może mieć <span class="highlight">wiele przyczyn</span></h2>

            <div class="diagrams">
                <!-- Left: Linear / Simple -->
                <div class="diagram left">
                    <span class="diagram-label">Proste myślenie</span>
                    <div class="linear-chain">
                        <div class="linear-node"><div class="dot"></div></div>
                        <div class="linear-line"></div>
                        <div class="linear-node"><div class="dot"></div></div>
                        <div class="linear-line"></div>
                        <div class="linear-node"><div class="dot"></div></div>
                        <div class="linear-line"></div>
                        <div class="linear-node"><div class="dot"></div></div>
                        <div class="linear-line"></div>
                        <div class="linear-node"><div class="dot"></div></div>
                    </div>
                </div>

                <!-- Right: Branching tree -->
                <div class="diagram right">
                    <span class="diagram-label">Rzeczywistość</span>
                    <div class="tree">
                        <!-- Root -->
                        <div class="tree-node"><div class="dot"></div></div>
                        <div class="tree-connector"></div>

                        <!-- Level 1: 2 branches -->
                        <div class="tree-level-1">
                            <div class="tree-branch">
                                <div class="tree-connector"></div>
                                <div class="tree-node"><div class="dot"></div></div>
                                <div class="tree-connector"></div>
                                <!-- Level 2: 2 sub-branches -->
                                <div class="tree-level-2">
                                    <div class="tree-branch">
                                        <div class="tree-connector"></div>
                                        <div class="tree-node"><div class="dot"></div></div>
                                    </div>
                                    <div class="tree-branch">
                                        <div class="tree-connector"></div>
                                        <div class="tree-node"><div class="dot"></div></div>
                                    </div>
                                </div>
                            </div>
                            <div class="tree-branch">
                                <div class="tree-connector"></div>
                                <div class="tree-node"><div class="dot"></div></div>
                                <div class="tree-connector"></div>
                                <!-- Level 2: 3 sub-branches -->
                                <div class="tree-level-2">
                                    <div class="tree-branch">
                                        <div class="tree-connector"></div>
                                        <div class="tree-node"><div class="dot"></div></div>
                                    </div>
                                    <div class="tree-branch">
                                        <div class="tree-connector"></div>
                                        <div class="tree-node"><div class="dot"></div></div>
                                    </div>
                                    <div class="tree-branch">
                                        <div class="tree-connector"></div>
                                        <div class="tree-node"><div class="dot"></div></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
