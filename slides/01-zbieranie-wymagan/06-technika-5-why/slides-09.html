<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 09 - Kluczowy wniosek</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1200px;
            height: 1200px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.12;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 1400px;
            margin-top: -40px;
        }

        .section-label {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--cyan-400);
            margin-bottom: 16px;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 0.2s forwards;
        }

        .slide-title {
            font-size: 60px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 56px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.4s forwards;
        }

        .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.4);
        }

        .solutions {
            display: flex;
            gap: 60px;
            margin-bottom: 56px;
        }

        .solution-card {
            width: 420px;
            padding: 40px 36px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            opacity: 0;
        }

        .solution-card.wrong {
            background: rgba(248, 113, 113, 0.06);
            border: 2px solid rgba(248, 113, 113, 0.3);
            animation: fadeUp 0.6s ease-out 0.7s forwards;
        }

        .solution-card.right {
            background: rgba(34, 197, 94, 0.06);
            border: 2px solid rgba(34, 197, 94, 0.3);
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.1);
            animation: fadeUp 0.6s ease-out 1.0s forwards;
        }

        .solution-card .icon-circle {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .solution-card.wrong .icon-circle {
            background: rgba(248, 113, 113, 0.15);
        }

        .solution-card.right .icon-circle {
            background: rgba(34, 197, 94, 0.15);
        }

        .solution-card .icon-circle i {
            font-size: 36px;
        }

        .solution-card.wrong .icon-circle i {
            color: #f87171;
        }

        .solution-card.right .icon-circle i {
            color: #4ade80;
        }

        .solution-card .label {
            font-size: 26px;
            font-weight: 700;
        }

        .solution-card.wrong .label {
            text-decoration: line-through;
            color: #fca5a5;
        }

        .solution-card.right .label {
            color: #86efac;
        }

        .takeaway {
            font-size: 24px;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeUp 0.6s ease-out 1.4s forwards;
        }

        .takeaway strong {
            color: var(--cyan-400);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 500px; height: 500px; top: 10%; left: 10%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 15%; right: 15%;"></div>

        <div class="content">
            <div class="section-label">WNIOSEK</div>
            <h1 class="slide-title">Napraw <span class="highlight">przyczynę</span>, nie symptom</h1>

            <div class="solutions">
                <div class="solution-card wrong">
                    <div class="icon-circle">
                        <i class="ti ti-x"></i>
                    </div>
                    <div class="label">Wymiana bezpiecznika</div>
                </div>

                <div class="solution-card right">
                    <div class="icon-circle">
                        <i class="ti ti-check"></i>
                    </div>
                    <div class="label">Dodanie filtra</div>
                </div>
            </div>

            <div class="takeaway">Inne podejście = <strong>inny rezultat</strong></div>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
