<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 09 - BA vs Architekt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --dark-900: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1200px;
            height: 1200px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .accent {
            position: absolute;
            background: var(--cyan-400);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.1;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 1400px;
            margin-top: -60px;
        }

        .section-label {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--cyan-400);
            margin-bottom: 16px;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 0.2s forwards;
        }

        .slide-title {
            font-size: 52px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 56px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.4s forwards;
        }

        .highlight {
            color: var(--cyan-400);
            text-shadow: 0 0 30px rgba(6, 182, 212, 0.4);
        }

        .comparison-table {
            width: 900px;
            border-collapse: separate;
            border-spacing: 0;
            margin-bottom: 48px;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.7s forwards;
        }

        .comparison-table th {
            padding: 20px 32px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            text-align: center;
        }

        .comparison-table th:first-child {
            background: rgba(148, 163, 184, 0.08);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 12px 0 0 0;
            color: var(--text-muted);
        }

        .comparison-table th:last-child {
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(34, 211, 238, 0.3);
            border-radius: 0 12px 0 0;
            color: var(--cyan-400);
        }

        .comparison-table td {
            padding: 22px 32px;
            font-size: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .comparison-table td:first-child {
            background: rgba(148, 163, 184, 0.04);
            border-left: 1px solid rgba(148, 163, 184, 0.15);
            border-right: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
        }

        .comparison-table td:last-child {
            background: rgba(6, 182, 212, 0.04);
            border-right: 1px solid rgba(34, 211, 238, 0.2);
            color: var(--text-main);
        }

        .comparison-table tr:last-child td:first-child {
            border-radius: 0 0 0 12px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.15);
        }

        .comparison-table tr:last-child td:last-child {
            border-radius: 0 0 12px 0;
            border-bottom: 1px solid rgba(34, 211, 238, 0.2);
        }

        .bottom-text {
            font-size: 26px;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeUp 0.7s ease-out 1.2s forwards;
        }

        .bottom-text strong {
            color: var(--cyan-400);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .camera-box {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 480px;
            height: 270px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            z-index: 100;
        }

        .slide-logo {
            position: absolute;
            z-index: 100;
            bottom: 40px;
            left: 40px;
            height: 100px;
            width: auto;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="accent" style="width: 500px; height: 500px; top: 15%; left: 10%;"></div>
        <div class="accent" style="width: 400px; height: 400px; bottom: 15%; right: 20%;"></div>

        <div class="content">
            <div class="section-label">PORÓWNANIE</div>
            <h1 class="slide-title">BA vs <span class="highlight">Architekt</span></h1>

            <table class="comparison-table">
                <thead>
                    <tr>
                        <th>Business Analyst</th>
                        <th>Architekt</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Wymagania funkcjonalne</td>
                        <td>Wymagania architektoniczne</td>
                    </tr>
                    <tr>
                        <td>Co system robi</td>
                        <td>Jak system ma działać</td>
                    </tr>
                    <tr>
                        <td>User stories</td>
                        <td>Quality attributes</td>
                    </tr>
                </tbody>
            </table>

            <p class="bottom-text">Obie role są <strong>komplementarne</strong></p>
        </div>

        <img src="../../../logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            kamera 480 &times; 270
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                const scale = Math.min(innerWidth / 1920, innerHeight / 1080);
                stage.style.transformOrigin = 'top left';
                stage.style.transform = 'scale(' + scale + ')';
                stage.style.left = (innerWidth - 1920 * scale) / 2 + 'px';
                stage.style.top = (innerHeight - 1080 * scale) / 2 + 'px';
            }
            window.addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
