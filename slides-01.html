<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 01 — Architekt oprogramowania w erze AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cyan-400: #22d3ee;
            --cyan-500: #06b6d4;
            --cyan-600: #0891b2;
            --cyan-700: #0e7490;
            --cyan-900: #164e63;
            --dark-bg: #0a0e17;
            --dark-surface: #111827;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: #f0f4f8;
        }

        .slide {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* --- animated background --- */
        .bg-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(6,182,212,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6,182,212,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0%   { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }

        .bg-glow {
            position: absolute;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(6,182,212,0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 6s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50%      { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        }

        /* floating particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--cyan-400);
            opacity: 0;
            animation: float 8s ease-in-out infinite;
        }

        .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 85%; top: 15%; animation-delay: 1.5s; }
        .particle:nth-child(3) { left: 70%; top: 75%; animation-delay: 3s; }
        .particle:nth-child(4) { left: 20%; top: 80%; animation-delay: 4.5s; }
        .particle:nth-child(5) { left: 50%; top: 10%; animation-delay: 2s; }
        .particle:nth-child(6) { left: 90%; top: 50%; animation-delay: 5s; }
        .particle:nth-child(7) { left: 5%;  top: 55%; animation-delay: 3.5s; }
        .particle:nth-child(8) { left: 40%; top: 90%; animation-delay: 1s; }

        @keyframes float {
            0%   { opacity: 0; transform: translateY(0) scale(1); }
            20%  { opacity: 0.8; }
            80%  { opacity: 0.8; }
            100% { opacity: 0; transform: translateY(-120px) scale(0.5); }
        }

        /* --- content --- */
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 900px;
            padding: 0 2rem;
        }

        .module-label {
            display: inline-block;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--cyan-400);
            border: 1px solid var(--cyan-700);
            border-radius: 100px;
            padding: 0.4em 1.4em;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.3s forwards;
        }

        .title {
            font-size: clamp(2.4rem, 5vw, 4rem);
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.6s forwards;
        }

        .title .highlight {
            background: linear-gradient(135deg, var(--cyan-400), var(--cyan-600));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: clamp(1rem, 2vw, 1.35rem);
            font-weight: 300;
            color: #94a3b8;
            line-height: 1.6;
            max-width: 680px;
            margin: 0 auto;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.9s forwards;
        }

        .divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--cyan-500), transparent);
            border: none;
            margin: 2rem auto;
            border-radius: 2px;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 1.1s forwards;
        }

        .era-chips {
            display: flex;
            gap: 0.6rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 0.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 1.3s forwards;
        }

        .chip {
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            padding: 0.35em 1em;
            border-radius: 100px;
            background: rgba(6,182,212,0.08);
            border: 1px solid rgba(6,182,212,0.2);
            color: var(--cyan-400);
            transition: all 0.3s ease;
        }

        .chip:hover {
            background: rgba(6,182,212,0.18);
            border-color: var(--cyan-400);
            transform: translateY(-2px);
        }

        /* corner accents */
        .corner {
            position: absolute;
            width: 60px;
            height: 60px;
            z-index: 1;
        }

        .corner::before,
        .corner::after {
            content: '';
            position: absolute;
            background: var(--cyan-700);
        }

        .corner--tl { top: 30px; left: 30px; }
        .corner--tl::before { width: 24px; height: 2px; top: 0; left: 0; }
        .corner--tl::after  { width: 2px; height: 24px; top: 0; left: 0; }

        .corner--br { bottom: 30px; right: 30px; }
        .corner--br::before { width: 24px; height: 2px; bottom: 0; right: 0; }
        .corner--br::after  { width: 2px; height: 24px; bottom: 0; right: 0; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="slide">
        <!-- background layers -->
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

        <!-- corner accents -->
        <div class="corner corner--tl"></div>
        <div class="corner corner--br"></div>

        <!-- slide content -->
        <div class="content">
            <h1 class="title">
                Architekt oprogramowania<br>
                w erze <span class="highlight">AI</span>
            </h1>

            <p class="subtitle">
                Jak zmieniała się rola architekta i dokąd zmierza
            </p>

            <hr class="divider">

            <div class="era-chips">
                <span class="chip">Mainframe</span>
                <span class="chip">Minikomputery</span>
                <span class="chip">Internet</span>
                <span class="chip">Chmura</span>
                <span class="chip">Mikrousługi</span>
                <span class="chip">AI</span>
            </div>
        </div>
    </div>
</body>
</html>
