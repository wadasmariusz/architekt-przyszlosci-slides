<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 01 — Architekt oprogramowania w erze AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="stage" id="stage">
        <div class="background">
            <div class="bg-grid"></div>
            <div class="bg-glow"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="corner corner--tl"></div>
            <div class="corner corner--br"></div>
        </div>

        <div class="content">
            <h1 class="title">
                Architekt oprogramowania<br>
                w erze <span class="highlight">AI</span>
            </h1>
            <p class="subtitle">
                Jak zmieniała się rola architekta i dokąd zmierza
            </p>
            <hr class="divider">
            <div class="era-chips">
                <span class="chip">Mainframe</span>
                <span class="chip">Minikomputery</span>
                <span class="chip">Internet</span>
                <span class="chip">Chmura</span>
                <span class="chip">Mikrousługi</span>
                <span class="chip">AI</span>
            </div>
        </div>

        <img src="logo/Architekt_Przyszłości_horizontal_gradient_light.png" alt="Architekt Przyszłości" class="slide-logo">

        <div class="camera-box">
            <div class="camera-box__placeholder">kamera 480 &times; 270</div>
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                stage.style.transform = 'scale(' + Math.min(innerWidth / 1920, innerHeight / 1080) + ')';
            }
            addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
