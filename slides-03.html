<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 03 — ERA Mainframe</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .content {
            bottom: 80px;
            max-width: 1100px;
            left: 50%;
            right: auto;
            transform: translateX(-50%);
            width: 100%;
            padding: 0 80px;
        }

        .section-title { margin-bottom: 48px; }

        /* --- mainframe visualization --- */
        .mainframe-scene {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 48px;
            margin-bottom: 48px;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.9s forwards;
        }

        .mainframe {
            width: 180px; height: 240px;
            background: rgba(17,24,39,0.8);
            border: 1px solid rgba(6,182,212,0.2);
            border-radius: 12px;
            position: relative;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 24px;
            box-shadow: 0 0 40px rgba(6,182,212,0.08);
        }

        .mainframe-screen {
            width: 120px; height: 80px;
            background: rgba(6,182,212,0.06);
            border: 1px solid rgba(6,182,212,0.2);
            border-radius: 6px;
            margin-bottom: 16px;
            position: relative; overflow: hidden;
        }
        .mainframe-screen::after {
            content: '>'; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: var(--cyan-400); font-size: 24px; font-family: monospace;
            animation: blink 1.2s step-end infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .mainframe-lights { display: flex; gap: 6px; margin-bottom: 13px; }
        .light { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan-700); }
        .light:nth-child(1) { animation: lightBlink 2s ease-in-out infinite 0s; }
        .light:nth-child(2) { animation: lightBlink 2s ease-in-out infinite 0.4s; }
        .light:nth-child(3) { animation: lightBlink 2s ease-in-out infinite 0.8s; }
        .light:nth-child(4) { animation: lightBlink 2s ease-in-out infinite 1.2s; }
        .light:nth-child(5) { animation: lightBlink 2s ease-in-out infinite 1.6s; }
        @keyframes lightBlink {
            0%, 100% { background: var(--cyan-700); box-shadow: none; }
            50%      { background: var(--cyan-400); box-shadow: 0 0 8px rgba(34,211,238,0.6); }
        }

        .mainframe-reels { display: flex; gap: 12px; }
        .reel {
            width: 36px; height: 36px; border-radius: 50%;
            border: 2px solid rgba(6,182,212,0.2);
            position: relative; animation: spin 4s linear infinite;
        }
        .reel::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border-radius: 50%;
            background: rgba(6,182,212,0.15); transform: translate(-50%, -50%);
        }
        .reel:nth-child(2) { animation-direction: reverse; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .person { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .person-head { width: 28px; height: 28px; border-radius: 50%; background: rgba(6,182,212,0.15); border: 1px solid rgba(6,182,212,0.3); }
        .person-body { width: 20px; height: 40px; border-radius: 8px 8px 4px 4px; background: rgba(6,182,212,0.1); border: 1px solid rgba(6,182,212,0.2); }
        .person-label { font-size: 11px; color: var(--cyan-400); font-weight: 600; margin-top: 5px; white-space: nowrap; }

        .connection { position: relative; align-self: center; margin-bottom: 48px; }
        .connection-line { width: 60px; height: 2px; background: linear-gradient(90deg, var(--cyan-700), var(--cyan-400)); animation: pulseLine 2s ease-in-out infinite; }
        @keyframes pulseLine { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* bullet points */
        .bullets { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; margin-bottom: 40px; }
        .bullet {
            display: flex; align-items: center; gap: 10px;
            padding: 13px 22px; border-radius: 12px;
            background: rgba(17,24,39,0.7); border: 1px solid rgba(6,182,212,0.12);
            backdrop-filter: blur(8px); opacity: 0; transition: all 0.3s ease;
        }
        .bullet:hover { border-color: var(--cyan-500); background: rgba(6,182,212,0.08); transform: translateY(-4px); box-shadow: 0 6px 24px rgba(6,182,212,0.12); }
        .bullet:nth-child(1) { animation: fadeUp 0.6s ease-out 1.2s forwards; }
        .bullet:nth-child(2) { animation: fadeUp 0.6s ease-out 1.5s forwards; }
        .bullet:nth-child(3) { animation: fadeUp 0.6s ease-out 1.8s forwards; }
        .bullet-icon { font-size: 26px; line-height: 1; }
        .bullet-text { font-size: 18px; font-weight: 400; color: #e2e8f0; text-align: left; }
        .bullet-text strong { color: var(--cyan-400); font-weight: 600; }

        /* memory bar */
        .memory-bar-wrap {
            display: flex; align-items: center; justify-content: center; gap: 16px;
            margin-bottom: 40px; opacity: 0; animation: fadeUp 0.8s ease-out 2.1s forwards;
        }
        .memory-label { font-size: 15px; font-weight: 600; color: var(--cyan-400); letter-spacing: 0.08em; }
        .memory-bar { width: 300px; height: 20px; border-radius: 10px; background: rgba(17,24,39,0.8); border: 1px solid rgba(6,182,212,0.15); overflow: hidden; position: relative; }
        .memory-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--cyan-700), var(--cyan-400)); border-radius: 10px; animation: fillBar 1.5s ease-out 2.5s forwards; position: relative; }
        .memory-fill::after { content: '4 KB'; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 12px; font-weight: 700; color: var(--dark-bg); }
        @keyframes fillBar { to { width: 100%; } }
        .memory-total { font-size: 14px; color: #64748b; font-weight: 300; }

        /* lesson delay override */
        .lesson { animation-delay: 2.8s; }
    </style>
</head>
<body>
    <div class="stage" id="stage">
        <div class="background">
            <div class="bg-grid"></div>
            <div class="bg-glow"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="corner corner--tl"></div>
            <div class="corner corner--br"></div>
        </div>

        <div class="content">
            <span class="era-chip">lata 50.</span>

            <h2 class="section-title">
                <span class="highlight">Jeden człowiek</span>, jedna maszyna
            </h2>

            <div class="mainframe-scene">
                <div class="mainframe">
                    <div class="mainframe-screen"></div>
                    <div class="mainframe-lights">
                        <div class="light"></div>
                        <div class="light"></div>
                        <div class="light"></div>
                        <div class="light"></div>
                        <div class="light"></div>
                    </div>
                    <div class="mainframe-reels">
                        <div class="reel"></div>
                        <div class="reel"></div>
                    </div>
                </div>

                <div class="connection">
                    <div class="connection-line"></div>
                </div>

                <div class="person">
                    <div class="person-head"></div>
                    <div class="person-body"></div>
                    <span class="person-label">Główny programista</span>
                </div>
            </div>

            <div class="bullets">
                <div class="bullet">
                    <span class="bullet-icon">👤</span>
                    <span class="bullet-text"><strong>Główny programista</strong></span>
                </div>
                <div class="bullet">
                    <span class="bullet-icon">⚙️</span>
                    <span class="bullet-text">Decyzje podyktowane <strong>przez sprzęt</strong></span>
                </div>
                <div class="bullet">
                    <span class="bullet-icon">📏</span>
                    <span class="bullet-text"><strong>4 KB pamięci</strong> = zmieść program w 4 KB</span>
                </div>
            </div>

            <div class="memory-bar-wrap">
                <span class="memory-label">RAM</span>
                <div class="memory-bar">
                    <div class="memory-fill"></div>
                </div>
                <span class="memory-total">4 KB / 4 KB</span>
            </div>

            <div class="lesson">
                <span class="lesson-icon">💡</span>
                <span class="lesson-text"><strong>Zasoby zawsze mają swoją cenę</strong> </br>  nawet w chmurze</span>
            </div>
        </div>

        <div class="camera-box">
            <div class="camera-box__placeholder">kamera 480 &times; 270</div>
        </div>
    </div>

    <script>
        (function () {
            const stage = document.getElementById('stage');
            function rescale() {
                stage.style.transform = 'scale(' + Math.min(innerWidth / 1920, innerHeight / 1080) + ')';
            }
            addEventListener('resize', rescale);
            rescale();
        })();
    </script>
</body>
</html>
