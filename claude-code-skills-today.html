<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skills Today – Sub-agents & Dynamic Context</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
  canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=1920;canvas.height=1080;
const W=canvas.width,H=canvas.height;

function easeOutCubic(t){return 1-Math.pow(1-t,3)}
function easeOutBack(t){const c=1.7;return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2)}
function easeOutElastic(t){return t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-.75)*(2*Math.PI)/3)+1}
function easeInCubic(t){return t*t*t}
function clamp01(t){return Math.max(0,Math.min(1,t))}
function lerp(a,b,t){return a+(b-a)*t}

const ORANGE='#D4845A',ORANGE_L='#E8A070',ORANGE_D='#B5664A',ORANGE_B='#F0B088',ORANGE_DIM='#8B5E3C';
const GREEN='#6A9955',BLUE='#569CD6',CYAN='#4EC9B0',PURPLE='#C586C0',YELLOW='#DCDCAA',WHITE_D='#ccc',GRAY='#808080';
const RED='#F44747';

// ═══════════════════════════════════════
// HEXAGON HELPER
// ═══════════════════════════════════════
function drawHex(x,y,size){
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=(Math.PI/3)*i-Math.PI/6;
    i===0?ctx.moveTo(x+Math.cos(a)*size,y+Math.sin(a)*size):ctx.lineTo(x+Math.cos(a)*size,y+Math.sin(a)*size)}
  ctx.closePath();
}

function drawAgent(x,y,size,color1,color2,label,alpha,scale,time,eyes){
  if(alpha<.01||scale<.01)return;
  ctx.save();ctx.globalAlpha=alpha;ctx.translate(x,y);ctx.scale(scale,scale);
  // Glow
  const gr=ctx.createRadialGradient(0,0,size*.2,0,0,size*2);
  gr.addColorStop(0,color1+'55');gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr;ctx.beginPath();ctx.arc(0,0,size*2,0,Math.PI*2);ctx.fill();
  // Body
  drawHex(0,0,size);
  const bg=ctx.createLinearGradient(-size,-size,size,size);
  bg.addColorStop(0,color1);bg.addColorStop(1,color2);
  ctx.fillStyle=bg;ctx.fill();ctx.strokeStyle=color1;ctx.lineWidth=2;ctx.stroke();
  // Eyes
  if(eyes!==false){
    ctx.fillStyle='#000';ctx.fillRect(-10,-8,7,8);ctx.fillRect(4,-8,7,8);
    ctx.fillStyle='#fff';ctx.fillRect(-8,-6,3,3);ctx.fillRect(6,-6,3,3);
    ctx.strokeStyle='#000';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,4,6,.2,Math.PI-.2);ctx.stroke();
  }
  // Label
  if(label){ctx.fillStyle='#fff';ctx.font=`bold ${size>35?14:11}px monospace`;ctx.textAlign='center';ctx.fillText(label,0,size+18)}
  // Spin ring
  ctx.strokeStyle=color1+'66';ctx.lineWidth=1.5;
  const ra=time*1.2;
  ctx.beginPath();ctx.arc(0,0,size+10,ra,ra+1.2);ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,size+10,ra+Math.PI,ra+Math.PI+1.2);ctx.stroke();
  ctx.restore();
}

// ═══════════════════════════════════════
// TERMINAL MINI
// ═══════════════════════════════════════
function drawMiniTerminal(x,y,w,h,alpha,scale,lines,title){
  if(alpha<.01)return;
  ctx.save();ctx.globalAlpha=alpha;ctx.translate(x,y);ctx.scale(scale,scale);
  // Window
  ctx.fillStyle='#0d0d0d';ctx.beginPath();ctx.roundRect(-w/2,-h/2-28,w,h+28,8);ctx.fill();
  ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.stroke();
  // Chrome
  ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.roundRect(-w/2,-h/2-28,w,28,[8,8,0,0]);ctx.fill();
  const dy=-h/2-14;
  ctx.fillStyle='#ff5f57';ctx.beginPath();ctx.arc(-w/2+16,dy,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#febc2e';ctx.beginPath();ctx.arc(-w/2+30,dy,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#28c840';ctx.beginPath();ctx.arc(-w/2+44,dy,4,0,Math.PI*2);ctx.fill();
  if(title){ctx.fillStyle='#888';ctx.font='11px monospace';ctx.textAlign='center';ctx.fillText(title,0,dy+3)}
  // Lines
  ctx.textAlign='left';
  let ly=-h/2+18;
  for(const ln of lines){
    ctx.fillStyle=ln.color||WHITE_D;ctx.font=ln.bold?'bold 13px monospace':'13px monospace';
    ctx.fillText(ln.text,-w/2+14,ly);ly+=20;
  }
  ctx.restore();
}

// ═══════════════════════════════════════
// DATA STREAM
// ═══════════════════════════════════════
const dataStreams=[];
function spawnDataStream(sx,sy,tx,ty,icon,color,delay){
  dataStreams.push({sx,sy,tx,ty,icon,color,delay,progress:0,active:false,speed:.6+Math.random()*.3});
}

// ═══════════════════════════════════════
// AMBIENT
// ═══════════════════════════════════════
const ambientP=[];
for(let i=0;i<50;i++){ambientP.push({x:Math.random()*W,y:Math.random()*H,size:Math.random()*2+.5,speed:Math.random()*12+4,phase:Math.random()*Math.PI*2,alpha:Math.random()*.12+.03})}

// ═══════════════════════════════════════
// TIMELINE:
// 0-2     SKILL agent appears center
// 2-4     Sub-agent spawns, flies to own context bubble
// 4-6     Sub-agent works independently (own terminal, spinning)
// 6-8     Meanwhile: shell commands fire from SKILL
// 8-10    Shell data streams back into SKILL prompt area
// 10-11.5 Assembled prompt glows, ready
// 11.5-12.5 Claude (big agent) receives enriched prompt
// 12.5-14 Claude starts working with all context
// 14-15   Fade out
// ═══════════════════════════════════════

// Sub-agent context bubble
const SUB_X=W*.75, SUB_Y=H*.32;
// Shell area
const SHELL_X=W*.25, SHELL_Y=H*.65;
// Main skill
const SKILL_X=W/2, SKILL_Y=H/2;

// Shell command outputs
const shellLines1=[
  {text:'$ uname -a',color:GREEN},
  {text:'Darwin 24.6.0 arm64',color:WHITE_D},
  {text:'$ df -h /',color:GREEN},
  {text:'466Gi  312Gi  154Gi',color:WHITE_D},
];
const shellLines2=[
  {text:'$ git log --oneline -3',color:GREEN},
  {text:'a3f2c1d fix: auth flow',color:WHITE_D},
  {text:'b7e4a22 feat: new API',color:WHITE_D},
  {text:'c9d1f33 chore: deps',color:WHITE_D},
];

// Prompt assembly area
const promptLines=[
  {text:'# Context injected:',color:BLUE,bold:true},
  {text:'OS: Darwin 24.6.0 arm64',color:CYAN},
  {text:'Disk: 154Gi free',color:CYAN},
  {text:'Last commits: auth, API',color:CYAN},
  {text:'Sub-agent: analysis done',color:PURPLE},
  {text:'',color:''},
  {text:'# Ready for Claude',color:GREEN,bold:true},
];

// Connection particles
const connParticles=[];
function spawnConnParticle(fx,fy,tx,ty,color){
  connParticles.push({fx,fy,tx,ty,progress:0,speed:.4+Math.random()*.4,size:3+Math.random()*4,color,life:1});
}

let startTime=null,lastT=0;
let particleTimer=0;

function animate(timestamp){
  if(!startTime)startTime=timestamp;
  const t=(timestamp-startTime)/1000;
  const dt=Math.min(t-lastT,.05);
  lastT=t;

  ctx.clearRect(0,0,W,H);ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

  const gf=t<.5?t/.5:(t>14?clamp01(1-(t-14)/1):1);

  // Ambient
  for(const p of ambientP){
    p.y-=p.speed*dt;if(p.y<-10){p.y=H+10;p.x=Math.random()*W}
    ctx.globalAlpha=p.alpha*(.5+.5*Math.sin(t*2+p.phase))*gf;
    ctx.fillStyle=ORANGE_L;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // ═══ SKILL AGENT (center) ═══
  const skillAppear=easeOutBack(clamp01(t/.8));
  const skillFloat=Math.sin(t*1.3)*6;
  const skillAlpha=gf*(t>12.5?clamp01(1-(t-12.5)/.8):1);

  // Skill pulse ring
  if(t>1&&skillAlpha>.01){
    const pr=(t*.6)%1;
    ctx.globalAlpha=(1-pr)*.15*skillAlpha;
    ctx.strokeStyle=ORANGE_B;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(SKILL_X,SKILL_Y+skillFloat,55+pr*60,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  }

  drawAgent(SKILL_X,SKILL_Y+skillFloat,50,ORANGE_B,ORANGE,'SKILL',skillAlpha,skillAppear,t);

  // ═══ SUB-AGENT SPAWN (2-4s) ═══
  if(t>1.8){
    const spawnT=clamp01((t-1.8)/1.5);
    const subScale=easeOutBack(clamp01(spawnT/.6));

    // Flying out from skill
    const flyT=easeOutCubic(clamp01(spawnT));
    const subX=lerp(SKILL_X,SUB_X,flyT);
    const subY=lerp(SKILL_Y,SUB_Y,flyT);
    const subFloat=Math.sin(t*1.8+1)*5;

    // Trail during flight
    if(spawnT<.8&&spawnT>.05){
      ctx.save();ctx.globalAlpha=(.8-spawnT)*gf*.5;
      ctx.strokeStyle=PURPLE;ctx.lineWidth=2;ctx.setLineDash([6,4]);ctx.lineDashOffset=-Date.now()/50;
      ctx.beginPath();ctx.moveTo(SKILL_X,SKILL_Y+skillFloat);ctx.lineTo(subX,subY+subFloat);ctx.stroke();
      ctx.setLineDash([]);ctx.restore();
    }

    // Context bubble around sub-agent
    if(spawnT>.5){
      const bubbleAlpha=easeOutCubic(clamp01((spawnT-.5)/.5))*gf*(t>11?clamp01(1-(t-11)/1):1);
      ctx.save();ctx.globalAlpha=bubbleAlpha*.15;
      ctx.strokeStyle=PURPLE;ctx.lineWidth=2;ctx.setLineDash([10,5]);
      ctx.beginPath();ctx.arc(SUB_X,SUB_Y,120,0,Math.PI*2);ctx.stroke();
      ctx.setLineDash([]);
      // Label
      ctx.globalAlpha=bubbleAlpha*.6;
      ctx.fillStyle=PURPLE;ctx.font='bold 13px monospace';ctx.textAlign='center';
      ctx.fillText('own context',SUB_X,SUB_Y-130);
      ctx.restore();
    }

    const subAlpha=gf*(t>11?clamp01(1-(t-11)/1):1);
    drawAgent(subX,subY+subFloat,35,PURPLE,'#9B5BA0','SUB-AGENT',subAlpha,subScale,t);

    // Sub-agent's own mini terminal (4-10s)
    if(t>4&&t<11){
      const stAlpha=easeOutCubic(clamp01((t-4)/.6))*gf*(t>10?clamp01(1-(t-10)/1):1);
      const stLines=[];
      const subCmdT=clamp01((t-4.5)/3);
      const cmds=[
        {text:'Analyzing codebase...',color:CYAN},
        {text:'├─ scanning 142 files',color:WHITE_D},
        {text:'├─ building dep graph',color:WHITE_D},
        {text:'├─ checking patterns',color:WHITE_D},
        {text:'└─ analysis complete ✓',color:GREEN,bold:true},
      ];
      const vis=Math.floor(subCmdT*cmds.length);
      for(let i=0;i<vis&&i<cmds.length;i++)stLines.push(cmds[i]);

      drawMiniTerminal(SUB_X,SUB_Y+80,200,120,stAlpha,.85,stLines,'sub-agent');

      // Processing spinner
      if(t>4.5&&t<8){
        ctx.save();ctx.globalAlpha=stAlpha*.7;
        ctx.strokeStyle=PURPLE;ctx.lineWidth=3;ctx.lineCap='round';
        const sa=t*6;
        ctx.beginPath();ctx.arc(SUB_X,SUB_Y+subFloat,35+18,sa,sa+1.5);ctx.stroke();
        ctx.restore();
      }

      // Checkmark when done
      if(t>8){
        const chkAlpha=easeOutCubic(clamp01((t-8)/.4))*stAlpha;
        ctx.save();ctx.globalAlpha=chkAlpha;
        ctx.strokeStyle='#28c840';ctx.lineWidth=4;ctx.lineCap='round';
        const chx=SUB_X+90,chy=SUB_Y-15;
        ctx.beginPath();ctx.moveTo(chx-8,chy);ctx.lineTo(chx-2,chy+7);ctx.lineTo(chx+10,chy-10);ctx.stroke();
        ctx.restore();
      }
    }

    // Connection line back to skill (persistent)
    if(spawnT>.8&&t<12){
      ctx.save();ctx.globalAlpha=.25*gf;
      ctx.strokeStyle=PURPLE;ctx.lineWidth=1.5;ctx.setLineDash([6,6]);ctx.lineDashOffset=-Date.now()/80;
      ctx.beginPath();ctx.moveTo(SKILL_X,SKILL_Y+skillFloat);ctx.lineTo(SUB_X,SUB_Y+subFloat);ctx.stroke();
      ctx.setLineDash([]);ctx.restore();

      // Particles on connection
      particleTimer+=dt;
      if(particleTimer>.3&&t>3&&t<10){particleTimer=0;spawnConnParticle(SUB_X,SUB_Y,SKILL_X,SKILL_Y,PURPLE)}
    }
  }

  // ═══ SHELL COMMANDS (6-10s) ═══
  if(t>5.5){
    // Shell terminal 1
    const sh1Alpha=easeOutCubic(clamp01((t-5.5)/.6))*gf*(t>10?clamp01(1-(t-10)/1):1);
    const sh1Lines=[];
    const sh1T=clamp01((t-6)/2);
    const vis1=Math.floor(sh1T*shellLines1.length);
    for(let i=0;i<vis1;i++)sh1Lines.push(shellLines1[i]);

    drawMiniTerminal(SHELL_X,SHELL_Y-60,240,110,sh1Alpha,.9,sh1Lines,'shell #1');

    // Shell terminal 2
    if(t>7){
      const sh2Alpha=easeOutCubic(clamp01((t-7)/.6))*gf*(t>10?clamp01(1-(t-10)/1):1);
      const sh2Lines=[];
      const sh2T=clamp01((t-7.3)/2);
      const vis2=Math.floor(sh2T*shellLines2.length);
      for(let i=0;i<vis2;i++)sh2Lines.push(shellLines2[i]);

      drawMiniTerminal(SHELL_X,SHELL_Y+80,240,110,sh2Alpha,.9,sh2Lines,'shell #2');
    }

    // Connection from shell area to skill
    if(t>6.5&&t<10.5){
      ctx.save();ctx.globalAlpha=.2*gf;
      ctx.strokeStyle=CYAN;ctx.lineWidth=1.5;ctx.setLineDash([6,6]);ctx.lineDashOffset=-Date.now()/70;
      ctx.beginPath();ctx.moveTo(SHELL_X+130,SHELL_Y);ctx.lineTo(SKILL_X-60,SKILL_Y+skillFloat);ctx.stroke();
      ctx.setLineDash([]);ctx.restore();
    }

    // Data blocks flying from shell to skill
    if(t>7&&t<10){
      const blockT=((t-7)*.5)%1;
      const icons=['sys','git','env','pkg'];
      for(let i=0;i<3;i++){
        const bt=((t-7-i*.4)*.5)%1;
        if(bt<0||bt>1)continue;
        const et=easeOutCubic(bt);
        const bx=lerp(SHELL_X+100,SKILL_X-50,et);
        const by=lerp(SHELL_Y,SKILL_Y+skillFloat,et);
        const ba=Math.sin(bt*Math.PI)*gf;

        ctx.save();ctx.globalAlpha=ba*.8;
        // Block
        ctx.fillStyle='#111';ctx.beginPath();ctx.roundRect(bx-18,by-11,36,22,4);ctx.fill();
        ctx.strokeStyle=CYAN;ctx.lineWidth=1.5;ctx.stroke();
        ctx.fillStyle=CYAN;ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(icons[i%icons.length],bx,by);
        // Glow trail
        ctx.globalAlpha=ba*.2;
        const tg=ctx.createRadialGradient(bx,by,0,bx,by,25);
        tg.addColorStop(0,CYAN);tg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=tg;ctx.beginPath();ctx.arc(bx,by,25,0,Math.PI*2);ctx.fill();
        ctx.restore();
      }
    }
  }

  // ═══ PROMPT ASSEMBLY (9-12s) ═══
  if(t>9){
    const paAlpha=easeOutCubic(clamp01((t-9)/.8))*gf;
    const promptX=SKILL_X,promptY=SKILL_Y+130;

    // Prompt box
    ctx.save();ctx.globalAlpha=paAlpha;
    const pw=320,ph=180;
    ctx.fillStyle='#0a0a0a';
    ctx.beginPath();ctx.roundRect(promptX-pw/2,promptY-ph/2,pw,ph,8);ctx.fill();
    ctx.strokeStyle=ORANGE;ctx.lineWidth=2;ctx.stroke();

    // Title
    ctx.fillStyle=ORANGE_L;ctx.font='bold 12px monospace';ctx.textAlign='center';
    ctx.fillText('ENRICHED PROMPT',promptX,promptY-ph/2-8);

    // Lines appearing
    const plT=clamp01((t-9.5)/2);
    const visP=Math.floor(plT*promptLines.length);
    ctx.textAlign='left';
    let py2=promptY-ph/2+22;
    for(let i=0;i<visP&&i<promptLines.length;i++){
      const pl=promptLines[i];
      if(!pl.text){py2+=16;continue}
      ctx.fillStyle=pl.color;ctx.font=pl.bold?'bold 12px monospace':'12px monospace';
      ctx.fillText(pl.text,promptX-pw/2+14,py2);
      py2+=20;
    }

    // Glow when complete
    if(t>11){
      const glowT=clamp01((t-11)/.5);
      ctx.globalAlpha=paAlpha*glowT*.2;
      const gg=ctx.createRadialGradient(promptX,promptY,0,promptX,promptY,pw*.7);
      gg.addColorStop(0,ORANGE_B);gg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gg;ctx.beginPath();ctx.arc(promptX,promptY,pw*.7,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();

    // Arrow from prompt up to skill
    if(t>10.5){
      const arAlpha=easeOutCubic(clamp01((t-10.5)/.5))*gf;
      ctx.save();ctx.globalAlpha=arAlpha*.5;
      ctx.strokeStyle=ORANGE;ctx.lineWidth=2;ctx.setLineDash([6,4]);ctx.lineDashOffset=-Date.now()/60;
      ctx.beginPath();ctx.moveTo(promptX,promptY-ph/2-2);ctx.lineTo(SKILL_X,SKILL_Y+skillFloat+55);ctx.stroke();
      ctx.setLineDash([]);ctx.restore();
    }
  }

  // ═══ CLAUDE RECEIVES (11.5-14s) ═══
  if(t>11.5){
    const clAlpha=easeOutCubic(clamp01((t-11.5)/.8))*gf;
    const clScale=easeOutBack(clamp01((t-11.5)/.6));
    const clX=SKILL_X,clY=H*.12;

    // Big connection from skill to Claude
    if(t>12){
      const beamT=clamp01((t-12)/.8);
      ctx.save();
      ctx.globalAlpha=clAlpha*.4;
      ctx.strokeStyle=ORANGE_B;ctx.lineWidth=3;
      const beamEnd=lerp(SKILL_Y+skillFloat-55,clY+60,easeOutCubic(beamT));
      ctx.beginPath();ctx.moveTo(SKILL_X,SKILL_Y+skillFloat-55);ctx.lineTo(clX,beamEnd);ctx.stroke();

      // Beam glow
      ctx.globalAlpha=clAlpha*.1;
      ctx.lineWidth=12;ctx.strokeStyle=ORANGE_B;
      ctx.beginPath();ctx.moveTo(SKILL_X,SKILL_Y+skillFloat-55);ctx.lineTo(clX,beamEnd);ctx.stroke();
      ctx.restore();

      // Energy particles along beam
      for(let i=0;i<5;i++){
        const pp=((t-12)*2+i*.2)%1;
        if(beamT<.3)continue;
        const px=SKILL_X+(Math.random()-.5)*6;
        const py2=lerp(SKILL_Y-55,clY+60,pp);
        ctx.globalAlpha=Math.sin(pp*Math.PI)*.6*clAlpha;
        ctx.fillStyle=ORANGE_B;
        ctx.beginPath();ctx.arc(px,py2,2.5,0,Math.PI*2);ctx.fill();
      }
    }

    drawAgent(clX,clY+Math.sin(t*1.1)*4,60,ORANGE_B,ORANGE_D,'CLAUDE',clAlpha,clScale,t);

    // "Working" indicator
    if(t>12.5){
      const wAlpha=clAlpha*(.5+.5*Math.sin(t*4));
      ctx.save();ctx.globalAlpha=wAlpha;
      ctx.strokeStyle=ORANGE_B;ctx.lineWidth=3;ctx.lineCap='round';
      const wa=t*5;
      ctx.beginPath();ctx.arc(clX,clY+Math.sin(t*1.1)*4,75,wa,wa+2);ctx.stroke();
      ctx.beginPath();ctx.arc(clX,clY+Math.sin(t*1.1)*4,75,wa+Math.PI,wa+Math.PI+2);ctx.stroke();
      ctx.restore();
    }
  }

  // ═══ CONNECTION PARTICLES ═══
  for(let i=connParticles.length-1;i>=0;i--){
    const cp=connParticles[i];
    cp.progress+=cp.speed*dt;
    if(cp.progress>1){connParticles.splice(i,1);continue}
    const px=lerp(cp.fx,cp.tx,cp.progress);
    const py=lerp(cp.fy,cp.ty,cp.progress);
    const pa=Math.sin(cp.progress*Math.PI)*gf;
    ctx.globalAlpha=pa*.6;
    ctx.fillStyle=cp.color;
    ctx.beginPath();ctx.arc(px,py,cp.size*.5,0,Math.PI*2);ctx.fill();
    // Glow
    ctx.globalAlpha=pa*.15;
    const pg=ctx.createRadialGradient(px,py,0,px,py,cp.size*3);
    pg.addColorStop(0,cp.color);pg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pg;ctx.beginPath();ctx.arc(px,py,cp.size*3,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Scanlines
  ctx.fillStyle=`rgba(255,255,255,${.015*gf})`;
  for(let y=0;y<H;y+=4)ctx.fillRect(0,y,W,1);

  // Vignette
  const vg=ctx.createRadialGradient(W/2,H/2,H*.35,W/2,H/2,H*.85);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,`rgba(0,0,0,${.45*gf})`);
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  if(t>16){startTime=timestamp;lastT=0;connParticles.length=0;particleTimer=0}
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
